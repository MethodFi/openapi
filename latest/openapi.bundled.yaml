paths:
  /.well-known/jwks.json:
    get:
      operationId: listPublicJwks
      summary: List public JWKs
      description: Returns the currently active Method public keys for Message-Level Encryption.
      tags:
        - Public Keys
      security: []
      responses:
        '200':
          description: Public JWK set for Method encryption.
          headers:
            Cache-Control:
              description: Caching directive for the public JWK set.
              schema:
                type: string
                example: public, max-age=3600
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WellKnownJwksResponse'
              example:
                keys:
                  - kid: mthd_jwk_abc123
                    kty: RSA
                    alg: RSA-OAEP-256
                    use: enc
                    'n': sXchf3Hj7G6m1mQF2k38QeY7s9lQfV4sLzM0YJr7Q7B6U2CjQX8m5w
                    e: AQAB
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'
  /auth/{jwk_id}:
    get:
      operationId: retrievePublicJwk
      summary: Retrieve a public JWK
      description: Returns a single Method public key by identifier for Message-Level Encryption.
      tags:
        - Public Keys
      security: []
      parameters:
        - $ref: '#/components/parameters/MethodJwkIdParam'
      responses:
        '200':
          description: The requested public JWK.
          headers:
            Cache-Control:
              description: Caching directive for the public JWK.
              schema:
                type: string
                example: public, max-age=3600
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MethodPublicKeyResponse'
              example:
                success: true
                data:
                  id: mthd_jwk_abc123
                  jwk:
                    kid: mthd_jwk_abc123
                    kty: RSA
                    alg: RSA-OAEP-256
                    use: enc
                    'n': sXchf3Hj7G6m1mQF2k38QeY7s9lQfV4sLzM0YJr7Q7B6U2CjQX8m5w
                    e: AQAB
                  jwk_thumbprint: qn0x2fG8X0F9S9RzM1Tq8vQw8ap8T7iWmS0o9C9y4Lw
                  status: active
                  created_at: '2026-01-15T18:30:00.000Z'
                  updated_at: '2026-01-15T18:30:00.000Z'
                message: null
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
  /ping:
    get:
      operationId: ping
      summary: Health check
      description: Returns a simple health check response for authenticated API clients.
      tags:
        - Ping
      parameters:
        - $ref: '#/components/parameters/method_version'
      responses:
        '200':
          description: Successful health check.
          content:
            application/json:
              schema:
                type: object
                required:
                  - success
                  - data
                  - message
                properties:
                  success:
                    type: boolean
                    description: Always `true` for successful responses.
                  data:
                    type: string
                    enum:
                      - pong
                  message:
                    type:
                      - string
                      - 'null'
              example:
                success: true
                data: pong
                message: null
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'
  /accounts:
    get:
      operationId: listAccounts
      summary: List all accounts
      description: Returns a paginated list of accounts. Results can be filtered by status, type, holder, and date range.
      tags:
        - Accounts
      security:
        - SecretKey: []
      parameters:
        - $ref: '#/components/parameters/method_version'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageLimitParam'
        - $ref: '#/components/parameters/PageCursorParam'
        - $ref: '#/components/parameters/FromDateParam'
        - $ref: '#/components/parameters/ToDateParam'
        - name: status
          in: query
          required: false
          description: Filter accounts by status.
          schema:
            type: string
            enum:
              - active
              - disabled
        - name: type
          in: query
          required: false
          description: Filter accounts by type.
          schema:
            type: string
            enum:
              - ach
              - liability
              - clearing
              - debit_card
        - name: consent_status
          in: query
          required: false
          description: Filter accounts by consent status.
          schema:
            type: string
            enum:
              - pending
              - withdrawn
              - approved
        - name: holder_id
          in: query
          required: false
          description: Filter accounts by the entity ID that owns them.
          schema:
            type: string
            pattern: ^ent_\w+$
        - name: holder_ids
          in: query
          required: false
          description: Filter accounts by one or more entity IDs.
          style: form
          explode: true
          schema:
            type: array
            items:
              type: string
              pattern: ^ent_\w+$
        - name: include_pending_consent
          in: query
          required: false
          description: Include accounts that are still pending consent.
          schema:
            type: boolean
        - name: liability.mch_id
          in: query
          required: false
          description: Filter liability accounts by merchant ID.
          schema:
            type: string
            pattern: ^mch_\w+$
        - name: liability.type
          in: query
          required: false
          description: Filter liability accounts by liability type.
          schema:
            type: string
            enum:
              - credit_card
              - auto_loan
              - mortgage
              - personal_loan
              - student_loan
              - student_loans
              - collection
              - credit_builder
              - insurance
              - loan
              - medical
              - utility
              - bnpl
              - fintech
        - name: liability.ownership
          in: query
          required: false
          description: Filter liability accounts by ownership type.
          schema:
            type: string
            enum:
              - primary
              - authorized
              - joint
              - unknown
        - $ref: '#/components/parameters/expand_accounts'
      responses:
        '200':
          description: A paginated list of accounts.
          headers:
            Pagination-Page:
              $ref: '#/components/headers/Pagination-Page'
            Pagination-Page-Count:
              $ref: '#/components/headers/Pagination-Page-Count'
            Pagination-Page-Limit:
              $ref: '#/components/headers/Pagination-Page-Limit'
            Pagination-Total-Count:
              $ref: '#/components/headers/Pagination-Total-Count'
            Pagination-Page-Cursor-Prev:
              $ref: '#/components/headers/Pagination-Page-Cursor-Prev'
            Pagination-Page-Cursor-Next:
              $ref: '#/components/headers/Pagination-Page-Cursor-Next'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      operationId: createAccount
      summary: Create an account
      description: Creates a new account for the specified entity. The request body must include exactly one of `ach`, `liability`, `clearing`, or `debit_card` to determine the account type.
      tags:
        - Accounts
      security:
        - SecretKey: []
      parameters:
        - $ref: '#/components/parameters/method_version'
        - $ref: '#/components/parameters/idempotency_key'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountCreateRequest'
            examples:
              ach:
                summary: Create an ACH account
                value:
                  type: ach
                  holder_id: ent_au22b1fbFJbp8
                  ach:
                    routing: '111000025'
                    number: '000123456789'
                    type: checking
                  metadata:
                    customer_reference: acct-001
              liability:
                summary: Create a liability account
                value:
                  type: liability
                  holder_id: ent_au22b1fbFJbp8
                  liability:
                    mch_id: mch_4c1j9e4t4R8Qd
                    account_number: '4111111111111111'
                  metadata:
                    portfolio: cards
              debit_card:
                summary: Create a debit card account
                value:
                  type: debit_card
                  holder_id: ent_au22b1fbFJbp8
                  debit_card:
                    number: '4111111111111111'
                    exp_month: '12'
                    exp_year: 2028
                    cvv: '123'
                    billing_zip_code: '78701'
      responses:
        '200':
          description: The newly created account.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountResponse'
              example:
                success: true
                data:
                  id: acc_b9q2XVAnNFbp3
                  holder_id: ent_au22b1fbFJbp8
                  type: ach
                  status: active
                  consent_status: approved
                  ach:
                    routing: '111000025'
                    number: '000123456789'
                    type: checking
                  liability: null
                  clearing: null
                  debit_card: null
                  capabilities: []
                  available_capabilities:
                    - payments:send
                    - payments:receive
                  error: null
                  metadata:
                    customer_reference: acct-001
                  products: []
                  restricted_products: []
                  subscriptions: []
                  available_subscriptions: []
                  restricted_subscriptions: []
                  latest_verification_session: null
                  balance: null
                  payoff: null
                  payment_instrument: null
                  card_brand: null
                  update: null
                  attribute: null
                  sensitive: null
                  created_at: '2026-01-15T18:30:00.000Z'
                  updated_at: '2026-01-15T18:30:00.000Z'
                message: null
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'
  /accounts/{accountId}:
    get:
      operationId: retrieveAccount
      summary: Retrieve an account
      description: Retrieves an account by its unique identifier.
      tags:
        - Accounts
      security:
        - SecretKey: []
      parameters:
        - $ref: '#/components/parameters/method_version'
        - $ref: '#/components/parameters/AccountIdParam'
        - $ref: '#/components/parameters/expand_accounts'
      responses:
        '200':
          description: The requested account.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'
    put:
      operationId: updateAccount
      summary: Update an account
      description: Updates an account's metadata or liability account number.
      tags:
        - Accounts
      security:
        - SecretKey: []
      parameters:
        - $ref: '#/components/parameters/method_version'
        - $ref: '#/components/parameters/AccountIdParam'
        - $ref: '#/components/parameters/idempotency_key'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountUpdateRequest'
            examples:
              metadata:
                summary: Update account metadata
                value:
                  metadata:
                    servicing_tier: gold
              liability:
                summary: Update a liability account number
                value:
                  liability:
                    credit_card:
                      number: '5555444433331111'
      responses:
        '200':
          description: Account updated successfully.
          content:
            application/json:
              schema:
                type: object
                required:
                  - success
                  - data
                  - message
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: 'null'
                    example: null
                  message:
                    type:
                      - 'null'
                      - string
                    example: null
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'
  /accounts/{accountId}/attributes:
    get:
      operationId: listAccountAttributes
      summary: List all account attributes
      description: Returns a list of attributes for the specified account.
      tags:
        - Account Attributes
      security:
        - SecretKey: []
      parameters:
        - $ref: '#/components/parameters/method_version'
        - $ref: '#/components/parameters/AccountIdParam'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageLimitParam'
        - $ref: '#/components/parameters/PageCursorParam'
      responses:
        '200':
          description: A paginated list of account attributes.
          headers:
            Pagination-Page:
              $ref: '#/components/headers/Pagination-Page'
            Pagination-Page-Count:
              $ref: '#/components/headers/Pagination-Page-Count'
            Pagination-Page-Limit:
              $ref: '#/components/headers/Pagination-Page-Limit'
            Pagination-Total-Count:
              $ref: '#/components/headers/Pagination-Total-Count'
            Pagination-Page-Cursor-Prev:
              $ref: '#/components/headers/Pagination-Page-Cursor-Prev'
            Pagination-Page-Cursor-Next:
              $ref: '#/components/headers/Pagination-Page-Cursor-Next'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountAttributeListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      operationId: createAccountAttribute
      summary: Create an account attribute
      description: Creates a new attribute request for the specified account.
      tags:
        - Account Attributes
      security:
        - SecretKey: []
      parameters:
        - $ref: '#/components/parameters/method_version'
        - $ref: '#/components/parameters/idempotency_key'
        - $ref: '#/components/parameters/AccountIdParam'
      responses:
        '200':
          description: The newly created account attribute.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountAttributeResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'
  /accounts/{accountId}/attributes/{accAttrId}:
    get:
      operationId: retrieveAccountAttribute
      summary: Retrieve an account attribute
      description: Retrieves an account attribute by its unique identifier.
      tags:
        - Account Attributes
      security:
        - SecretKey: []
      parameters:
        - $ref: '#/components/parameters/method_version'
        - $ref: '#/components/parameters/AccountIdParam'
        - $ref: '#/components/parameters/AccountAttributeIdParam'
      responses:
        '200':
          description: The requested account attribute.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountAttributeResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'
  /accounts/{accountId}/balances:
    get:
      operationId: listAccountBalances
      summary: List all account balances
      description: Returns a list of balance records for the specified account.
      tags:
        - Account Balances
      security:
        - SecretKey: []
      parameters:
        - $ref: '#/components/parameters/method_version'
        - $ref: '#/components/parameters/AccountIdParam'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageLimitParam'
        - $ref: '#/components/parameters/PageCursorParam'
      responses:
        '200':
          description: A paginated list of account balances.
          headers:
            Pagination-Page:
              $ref: '#/components/headers/Pagination-Page'
            Pagination-Page-Count:
              $ref: '#/components/headers/Pagination-Page-Count'
            Pagination-Page-Limit:
              $ref: '#/components/headers/Pagination-Page-Limit'
            Pagination-Total-Count:
              $ref: '#/components/headers/Pagination-Total-Count'
            Pagination-Page-Cursor-Prev:
              $ref: '#/components/headers/Pagination-Page-Cursor-Prev'
            Pagination-Page-Cursor-Next:
              $ref: '#/components/headers/Pagination-Page-Cursor-Next'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountBalanceListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      operationId: createAccountBalance
      summary: Create an account balance
      description: Triggers a balance sync for the specified account and returns the new balance record.
      tags:
        - Account Balances
      security:
        - SecretKey: []
      parameters:
        - $ref: '#/components/parameters/method_version'
        - $ref: '#/components/parameters/idempotency_key'
        - $ref: '#/components/parameters/AccountIdParam'
      responses:
        '200':
          description: The newly created account balance.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountBalanceResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'
  /accounts/{accountId}/balances/{balId}:
    get:
      operationId: retrieveAccountBalance
      summary: Retrieve an account balance
      description: Retrieves an account balance by its unique identifier.
      tags:
        - Account Balances
      security:
        - SecretKey: []
      parameters:
        - $ref: '#/components/parameters/method_version'
        - $ref: '#/components/parameters/AccountIdParam'
        - $ref: '#/components/parameters/AccountBalanceIdParam'
      responses:
        '200':
          description: The requested account balance.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountBalanceResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'
  /accounts/{accountId}/card_brands:
    get:
      operationId: listAccountCardBrands
      summary: List all account card brands
      description: Returns a list of card brand records for the specified account.
      tags:
        - Account Card Brands
      security:
        - SecretKey: []
      parameters:
        - $ref: '#/components/parameters/method_version'
        - $ref: '#/components/parameters/AccountIdParam'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageLimitParam'
        - $ref: '#/components/parameters/PageCursorParam'
      responses:
        '200':
          description: A paginated list of account card brands.
          headers:
            Pagination-Page:
              $ref: '#/components/headers/Pagination-Page'
            Pagination-Page-Count:
              $ref: '#/components/headers/Pagination-Page-Count'
            Pagination-Page-Limit:
              $ref: '#/components/headers/Pagination-Page-Limit'
            Pagination-Total-Count:
              $ref: '#/components/headers/Pagination-Total-Count'
            Pagination-Page-Cursor-Prev:
