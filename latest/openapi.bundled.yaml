openapi: 3.1.0
info:
  title: Method API
  version: '2025-12-01'
  license:
    name: Proprietary
    url: https://methodfi.com
  description: |
    The Method API enables you to retrieve financial data, create payments, and manage
    entities and accounts programmatically. This specification covers the public API
    surface for version `2025-12-01`.

    ## Authentication

    Most API requests require a Bearer token in the `Authorization` header.
    Use your secret key (`sk_...`) for server-side requests and public key (`pk_...`)
    for client-side Element requests. Public Message-Level Encryption key discovery
    endpoints are documented separately and do not require authentication.

    ## Versioning

    The API version is selected via the `Method-Version` header. This spec targets
    version `2025-12-01`. The SDK sets this header automatically.

    ## Response Envelope

    Most JSON responses are wrapped in a standard envelope:

    ```json
    {
      "success": true,
      "data": { ... },
      "message": null
    }
    ```

    The `/.well-known/jwks.json` endpoint is an exception and returns a bare JWK set.

    ## Pagination

    List endpoints return pagination metadata in response headers:
    `Pagination-Page`, `Pagination-Page-Count`, `Pagination-Page-Limit`,
    `Pagination-Total-Count`, `Pagination-Page-Cursor-Prev`, `Pagination-Page-Cursor-Next`.

    ## Expandable Fields

    Certain resource fields can be expanded from IDs to full objects using the
    `expand` query parameter. Maximum nesting depth is 4 levels.
  contact:
    name: Method Financial
    url: https://methodfi.com
    email: team@methodfi.com
