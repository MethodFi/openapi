  responses:
    BadRequest:
      description: Bad request - invalid parameters or request body.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Unauthorized:
      description: Unauthorized - missing or invalid authentication token.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Forbidden:
      description: Forbidden - insufficient permissions for this operation.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    NotFound:
      description: Not found - the requested resource does not exist.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    InternalError:
      description: Internal server error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    RateLimited:
      description: Too many requests - rate limit exceeded.
      headers:
        Retry-After:
          description: Number of seconds to wait before retrying.
          schema:
            type: integer
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    UnprocessableEntity:
      description: Unprocessable entity - the request was valid JSON but failed business or validation rules.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    GatewayTimeout:
      description: Upstream timeout - the request could not be completed before the upstream deadline.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
  schemas:
    JwkPublic:
      type: object
      required:
        - kid
        - kty
        - alg
        - use
        - 'n'
        - e
      properties:
        kid:
          type: string
          description: Key identifier.
          example: mthd_jwk_abc123
        kty:
          type: string
          description: Key type.
          example: RSA
        alg:
          type: string
          description: JWK algorithm.
          example: RSA-OAEP-256
        use:
          type: string
          description: Intended key use.
          example: enc
        'n':
          type: string
          description: RSA modulus.
        e:
          type: string
          description: RSA public exponent.
    WellKnownJwksResponse:
      type: object
      required:
        - keys
      properties:
        keys:
          type: array
          items:
            $ref: '#/components/schemas/JwkPublic'
    ErrorObject:
      type: object
      required:
        - type
        - code
        - message
      properties:
        type:
          type: string
          description: Error type category.
          enum:
            - invalid_request
            - api_error
            - resource_error
        code:
          type: integer
          description: Numeric error code. Common codes include 400 (bad request), 401 (unauthorized), 403 (forbidden), 404 (not found), 422 (unprocessable entity), 429 (rate limited), and 500 (internal error).
        sub_type:
          type:
            - string
            - 'null'
          description: More specific error classification.
        message:
          type: string
          description: Human-readable error description.
    ErrorEnvelope:
      type: object
      required:
        - success
        - data
        - message
      properties:
        success:
          type: boolean
          description: Always `false` for error responses.
        data:
          type: object
          required:
            - error
          properties:
            error:
              $ref: '#/components/schemas/ErrorObject'
        message:
          type: string
    SuccessEnvelope:
      type: object
      description: Standard envelope for successful responses that return a single payload.
      required:
        - success
        - data
        - message
      properties:
        success:
          type: boolean
          description: Always `true` for successful responses.
        data:
          description: Operation-specific response payload.
        message:
          type:
            - string
            - 'null'
      example:
        success: true
        data: {}
        message: null
    MethodPublicKey:
      type: object
      required:
        - id
        - jwk
        - jwk_thumbprint
        - status
        - created_at
        - updated_at
      properties:
        id:
          type: string
          description: Unique identifier for the Method JWK.
          pattern: ^mthd_jwk_\w+$
        jwk:
          $ref: '#/components/schemas/JwkPublic'
        jwk_thumbprint:
          type: string
          description: SHA-256 thumbprint for the public JWK.
        status:
          type: string
          description: Lifecycle status of the public key.
          enum:
            - active
            - deprecated
            - disabled
        created_at:
          type: string
          format: date-time
          description: Timestamp when the key was created.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when the key was last updated.
    MethodPublicKeyResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/MethodPublicKey'
    ListEnvelope:
      type: object
      description: Standard envelope for successful responses that return a list payload.
      required:
        - success
        - data
        - message
      properties:
        success:
          type: boolean
          description: Always `true` for successful responses.
        data:
          description: Operation-specific list payload.
        message:
          type:
            - string
            - 'null'
      example:
        success: true
        data: []
        message: null
    AccountACH:
      type:
        - object
        - 'null'
      description: ACH account details. Present when `type` is `ach`.
      properties:
        routing:
          type: string
          description: The ACH routing number.
        number:
          type: string
          description: The ACH account number.
        type:
          type: string
          description: The type of ACH account.
          enum:
            - checking
            - savings
    MerchantType:
      type: string
      enum:
        - auto_loan
        - business_loan
        - credit_card
        - electric_utility
        - home_loan
        - insurance
        - internet_utility
        - loan
        - medical
        - personal_loan
        - student_loan
        - telephone_utility
        - television_utility
        - water_utility
        - bank
        - city
        - county
        - home_equity_loan
        - mortgage
        - utility
        - waste_utility
    MerchantProviderIds:
      type: object
      properties:
        plaid:
          type: array
          items:
            type: string
        mx:
          type: array
          items:
            type: string
        finicity:
          type: array
          items:
            type: string
        dpp:
          type: array
          items:
            type: string
        rpps:
          type: array
          items:
            type: string
    MerchantCredential:
      type: object
