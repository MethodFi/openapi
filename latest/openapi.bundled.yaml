          items:
            type: string
    AccountSensitiveResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/AccountSensitive'
    AccountSubscription:
