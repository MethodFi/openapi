          properties:
            data:
              type: object
              description: Object keyed by product name.
              additionalProperties:
                $ref: '#/components/schemas/AccountProduct'
    AccountProductResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/AccountProduct'
    AccountSensitiveListResponse:
