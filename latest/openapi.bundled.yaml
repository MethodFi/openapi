          description: Unique identifier for the card brand.
          pattern: ^cbrd_\w+$
          example: cbrd_aTJMbnCjw34yQ
        account_id:
          type: string
          description: The account this card brand belongs to.
          pattern: ^acc_\w+$
        network:
          type:
            - string
            - 'null'
          description: The card network.
          enum:
            - visa
            - mastercard
            - amex
            - discover
            - null
        issuer:
          type:
            - string
            - 'null'
          description: The card issuer.
        last4:
          type:
            - string
            - 'null'
          description: Last 4 digits of the card number.
        status:
          type: string
          description: Current status of the card brand request.
          enum:
            - completed
            - pending
            - failed
        error:
          $ref: '#/components/schemas/ResourceError'
        created_at:
          type: string
          format: date-time
          description: Timestamp when the card brand was created.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when the card brand was last updated.
    UpdateResourceError:
      type:
        - object
        - 'null'
      description: Error details when an account update fails.
      required:
        - type
        - code
        - sub_type
        - message
      properties:
        type:
          type: string
          description: The category of update error.
          enum:
            - UPDATE_FAILED
        code:
          type: integer
          description: Numeric error code (21XXX range).
          enum:
            - 21001
        sub_type:
          type: string
          description: Specific update error classification.
          enum:
            - UPDATE_TEMPORARILY_UNAVAILABLE
        message:
          type: string
          description: Human-readable error description.
      example:
        type: UPDATE_FAILED
        code: 21001
        sub_type: UPDATE_TEMPORARILY_UNAVAILABLE
        message: Update is temporarily unavailable for this account.
    AccountUpdate:
      type: object
      description: An update record for an account.
      required:
        - id
        - account_id
        - status
        - type
        - error
        - created_at
        - updated_at
      properties:
        id:
          type: string
          description: Unique identifier for the update.
          pattern: ^upd_\w+$
          example: upd_aTJMbnCjw34yQ
        account_id:
          type: string
          description: The account this update belongs to.
          pattern: ^acc_\w+$
        status:
          type: string
          description: Current status of the update.
          enum:
            - completed
            - pending
            - failed
        type:
          type: string
          description: The type of update.
        error:
          $ref: '#/components/schemas/UpdateResourceError'
        created_at:
          type: string
          format: date-time
          description: Timestamp when the update was created.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when the update was last updated.
    AccountAttribute:
      type: object
      description: An attribute record for an account containing financial data attributes.
      required:
        - id
        - account_id
        - status
        - attributes
        - error
        - created_at
        - updated_at
      properties:
        id:
          type: string
          description: Unique identifier for the account attribute.
          pattern: ^acc_attr_\w+$
          example: acc_attr_eTJMbnCjw34yQ
        account_id:
          type: string
          description: The account this attribute belongs to.
          pattern: ^acc_\w+$
        status:
          type: string
          description: Current status of the attribute request.
          enum:
            - completed
            - pending
            - failed
        attributes:
          type: object
          description: Financial data attributes for the account.
          additionalProperties: true
        error:
          $ref: '#/components/schemas/ResourceError'
        created_at:
          type: string
          format: date-time
          description: Timestamp when the attribute was created.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when the attribute was last updated.
    AccountSensitiveResourceError:
      type:
        - object
        - 'null'
      description: Error details when retrieving account sensitive data fails.
      required:
        - type
        - code
        - sub_type
        - message
      properties:
        type:
          type: string
          description: The category of sensitive data error.
          enum:
            - ACCOUNT_SENSITIVE_FAILED
        code:
          type: integer
          description: Numeric error code (17XXX range).
          enum:
            - 17001
        sub_type:
          type: string
          description: Specific sensitive data error classification.
          enum:
            - ACCOUNT_SENSITIVE_FAILED_VERIFICATION_REQUIRED
        message:
          type: string
          description: Human-readable error description.
      example:
        type: ACCOUNT_SENSITIVE_FAILED
        code: 17001
        sub_type: ACCOUNT_SENSITIVE_FAILED_VERIFICATION_REQUIRED
        message: Account sensitive failed due to missing required verification.
    AccountSensitive:
      type: object
      description: Sensitive data for an account.
      required:
        - id
        - account_id
        - status
        - type
        - fields
        - error
        - created_at
        - updated_at
      properties:
        id:
          type: string
          description: Unique identifier for the sensitive record.
          pattern: ^astv_\w+$
          example: astv_aTJMbnCjw34yQ
        account_id:
          type: string
          description: The account this sensitive data belongs to.
          pattern: ^acc_\w+$
        status:
          type: string
          description: Current status of the sensitive data request.
          enum:
            - completed
            - pending
            - failed
        type:
          type: string
          description: The type of sensitive data.
        fields:
          type: array
          description: List of sensitive data fields retrieved.
          items:
            type: object
            properties:
              name:
                type: string
                description: Name of the field.
              value:
                type: string
                description: Value of the field.
        error:
          $ref: '#/components/schemas/AccountSensitiveResourceError'
        created_at:
          type: string
          format: date-time
          description: Timestamp when the sensitive record was created.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when the sensitive record was last updated.
    AccountBase:
      type: object
      description: |
        An Account represents a financial account (ACH, liability, clearing, or debit card) associated with an Entity. Accounts are polymorphic on the `type` field.
      required:
        - id
        - holder_id
        - type
        - status
        - consent_status
        - products
        - restricted_products
        - subscriptions
        - available_subscriptions
        - restricted_subscriptions
        - created_at
        - updated_at
      properties:
        id:
          type: string
          description: Unique identifier for the account.
          pattern: ^acc_\w+$
          example: acc_b9q2XVAnNFbp3
        holder_id:
          type: string
          description: The entity ID that owns this account.
          pattern: ^ent_\w+$
          example: ent_au22b1fbFJbp8
        type:
          type: string
          description: The type of account.
          enum:
            - ach
            - liability
            - clearing
            - debit_card
        status:
          type: string
          description: Current status of the account.
          enum:
            - active
            - disabled
            - processing
            - pending_exchange
            - closed
        consent_status:
          type: string
          description: Current consent status for data access on this account.
          enum:
            - pending
            - withdrawn
            - approved
        ach:
          $ref: '#/components/schemas/AccountACH'
        liability:
          $ref: '#/components/schemas/AccountLiability'
        clearing:
          $ref: '#/components/schemas/AccountClearing'
        debit_card:
          $ref: '#/components/schemas/AccountDebitCard'
        error:
          $ref: '#/components/schemas/AccountResourceError'
        metadata:
          $ref: '#/components/schemas/Metadata'
        products:
          type: array
          description: Products currently active for this account.
          items:
            type: string
        restricted_products:
          type: array
          description: Products restricted from this account.
          items:
            type: string
        subscriptions:
          type: array
          description: Subscriptions currently active for this account.
          items:
            type: string
        available_subscriptions:
          type: array
          description: Subscriptions available to be enrolled for this account.
          items:
            type: string
        restricted_subscriptions:
          type: array
          description: Subscriptions restricted from this account.
          items:
            type: string
        latest_verification_session:
          description: |
            The latest verification session ID. This field is expandable. When expanded, returns the full AccountVerificationSession object.
          oneOf:
            - type: string
              pattern: ^avf_\w+$
            - type: 'null'
            - $ref: '#/components/schemas/AccountVerificationSession'
        balance:
          description: |
            The latest balance ID. This field is expandable. When expanded, returns the full AccountBalance object.
          oneOf:
            - type: string
              pattern: ^bal_\w+$
            - type: 'null'
            - $ref: '#/components/schemas/AccountBalance'
        payoff:
          description: |
            The latest payoff ID. This field is expandable. When expanded, returns the full AccountPayoff object.
          oneOf:
            - type: string
              pattern: ^pyf_\w+$
            - type: 'null'
            - $ref: '#/components/schemas/AccountPayoff'
        payment_instrument:
          description: |
            The latest payment instrument ID. This field is expandable. When expanded, returns the full AccountPaymentInstrument object.
          oneOf:
            - type: string
              pattern: ^pmt_inst_\w+$
            - type: 'null'
            - $ref: '#/components/schemas/AccountPaymentInstrument'
        card_brand:
          description: |
            The latest card brand ID. This field is expandable. When expanded, returns the full AccountCardBrand object.
          oneOf:
            - type: string
              pattern: ^cbrd_\w+$
            - type: 'null'
            - $ref: '#/components/schemas/AccountCardBrand'
        update:
          description: |
            The latest update ID. This field is expandable. When expanded, returns the full AccountUpdate object.
          oneOf:
            - type: string
              pattern: ^upd_\w+$
            - type: 'null'
            - $ref: '#/components/schemas/AccountUpdate'
        attribute:
          description: |
            The latest attribute ID. This field is expandable. When expanded, returns the full AccountAttribute object.
          oneOf:
            - type: string
              pattern: ^acc_attr_\w+$
            - type: 'null'
            - $ref: '#/components/schemas/AccountAttribute'
        sensitive:
          description: |
            The latest sensitive ID. This field is expandable. When expanded, returns the full AccountSensitive object.
          oneOf:
            - type: string
              pattern: ^astv_\w+$
            - type: 'null'
            - $ref: '#/components/schemas/AccountSensitive'
        created_at:
          type: string
          format: date-time
          description: Timestamp when the account was created.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when the account was last updated.
    AccountACHResource:
      allOf:
        - $ref: '#/components/schemas/AccountBase'
        - type: object
          properties:
            type:
              type: string
              enum:
                - ach
    AccountLiabilityResource:
      allOf:
        - $ref: '#/components/schemas/AccountBase'
        - type: object
          properties:
            type:
              type: string
              enum:
                - liability
    AccountClearingResource:
      allOf:
        - $ref: '#/components/schemas/AccountBase'
        - type: object
          properties:
            type:
              type: string
              enum:
                - clearing
    AccountDebitCardResource:
      allOf:
        - $ref: '#/components/schemas/AccountBase'
        - type: object
          properties:
            type:
              type: string
              enum:
                - debit_card
    Account:
      description: |
        An Account represents a financial account (ACH, liability, clearing, or debit card) associated with an Entity.
      oneOf:
        - $ref: '#/components/schemas/AccountACHResource'
        - $ref: '#/components/schemas/AccountLiabilityResource'
        - $ref: '#/components/schemas/AccountClearingResource'
        - $ref: '#/components/schemas/AccountDebitCardResource'
      discriminator:
        propertyName: type
        mapping:
          ach: '#/components/schemas/AccountACHResource'
          liability: '#/components/schemas/AccountLiabilityResource'
          clearing: '#/components/schemas/AccountClearingResource'
          debit_card: '#/components/schemas/AccountDebitCardResource'
    AccountListResponse:
      allOf:
        - $ref: '#/components/schemas/ListEnvelope'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/Account'
    CreateAchAccountRequest:
      type: object
      description: Create an ACH account.
      required:
        - holder_id
        - ach
      properties:
        type:
          type: string
          enum:
            - ach
        holder_id:
          type: string
          description: The entity ID that will own this account.
          pattern: ^ent_\w+$
        ach:
          type: object
          description: ACH account details.
          required:
            - routing
            - number
            - type
          properties:
            routing:
              type: string
              description: The ACH routing number.
              pattern: ^\d{9}$
            number:
              type: string
              description: The ACH account number.
              pattern: ^\d+$
            type:
              type: string
              description: The type of ACH account.
              enum:
                - checking
                - savings
        metadata:
          $ref: '#/components/schemas/Metadata'
    CreateLiabilityAccountRequest:
      type: object
      description: Create a liability account.
      required:
        - holder_id
        - liability
      properties:
        type:
          type: string
          enum:
            - liability
        holder_id:
          type: string
          description: The entity ID that will own this account.
          pattern: ^ent_\w+$
        liability:
          type: object
          description: Liability account details.
          properties:
            mch_id:
              type: string
              description: The merchant ID for the liability.
              pattern: ^mch_\w+$
            account_number:
              type: string
              description: Full account number for the liability.
            number:
              type: string
              description: Alternative liability account number field.
            credit_card:
              type: object
              description: Optional supplemental card details for liability accounts.
              required:
                - exp_month
                - exp_year
              properties:
                billing_zip_code:
                  type: string
                cvv:
                  type: string
                exp_month:
                  type: string
                  pattern: ^(0[1-9]|1[0-2])$
                exp_year:
                  type: integer
          oneOf:
            - required:
                - account_number
            - required:
                - number
        metadata:
          $ref: '#/components/schemas/Metadata'
    CreateClearingAccountRequest:
      type: object
      description: Create a clearing account.
      required:
        - holder_id
        - clearing
      properties:
        type:
          type: string
          enum:
            - clearing
        holder_id:
          type: string
          description: The entity ID that will own this account.
          pattern: ^ent_\w+$
        clearing:
          type: object
          description: Clearing account details.
          required:
            - type
          properties:
            type:
              type: string
              description: The type of clearing account to create.
              enum:
                - single_use
                - multi_use
        metadata:
          $ref: '#/components/schemas/Metadata'
    CreateDebitCardAccountRequest:
      type: object
      description: Create a debit card account.
      required:
        - holder_id
        - debit_card
      properties:
        type:
          type: string
          enum:
            - debit_card
        holder_id:
          type: string
          description: The entity ID that will own this account.
          pattern: ^ent_\w+$
        debit_card:
          type: object
          description: Debit card details.
          required:
            - number
            - exp_month
            - exp_year
          properties:
            number:
              type: string
              minLength: 15
              maxLength: 16
            exp_month:
              type: string
              pattern: ^(0[1-9]|1[0-2])$
            exp_year:
              type: integer
            cvv:
              type: string
            billing_zip_code:
              type: string
        metadata:
          $ref: '#/components/schemas/Metadata'
    AccountCreateRequest:
      description: |
        Request body for creating an account.
        `type` is recommended and used for discrimination in generated clients, but
        the API can also infer the account type from the nested object you provide.
      oneOf:
        - $ref: '#/components/schemas/CreateAchAccountRequest'
        - $ref: '#/components/schemas/CreateLiabilityAccountRequest'
        - $ref: '#/components/schemas/CreateClearingAccountRequest'
        - $ref: '#/components/schemas/CreateDebitCardAccountRequest'
      discriminator:
        propertyName: type
        mapping:
          ach: '#/components/schemas/CreateAchAccountRequest'
          liability: '#/components/schemas/CreateLiabilityAccountRequest'
          clearing: '#/components/schemas/CreateClearingAccountRequest'
          debit_card: '#/components/schemas/CreateDebitCardAccountRequest'
    AccountResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/Account'
    AccountUpdateRequest:
      type: object
      description: Request body for updating an account.
      properties:
        metadata:
          $ref: '#/components/schemas/Metadata'
        liability:
          type: object
          description: Liability-specific update fields. Use either mortgage or credit_card (mutually exclusive).
          properties:
            mortgage:
              type: object
              description: Mortgage address update.
              properties:
                address_street:
                  type: string
                address_city:
                  type: string
                address_state:
                  type: string
                address_zip:
                  type: string
            credit_card:
              type: object
              description: Credit card update. Provide either number alone, or expiration + CVV.
              properties:
                number:
                  type: string
                  description: The credit card number.
                expiration_month:
                  type: string
                  description: Card expiration month.
                expiration_year:
                  type: string
                  description: Card expiration year.
                cvv:
                  type: string
                  description: Card CVV.
    AccountAttributeListResponse:
      allOf:
        - $ref: '#/components/schemas/ListEnvelope'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/AccountAttribute'
    AccountAttributeResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/AccountAttribute'
    AccountBalanceListResponse:
      allOf:
        - $ref: '#/components/schemas/ListEnvelope'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/AccountBalance'
    AccountBalanceResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/AccountBalance'
    AccountCardBrandListResponse:
