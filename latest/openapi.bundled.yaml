        - id
        - name
        - status
        - latest_request_id
        - created_at
        - updated_at
      properties:
        id:
          type: string
          description: Unique identifier for the subscription.
          pattern: ^sub_\w+$
          example: sub_aTJMbnCjw34yQ
        name:
          type: string
          description: Name of the subscription.
        status:
          type: string
          description: Current status of the subscription.
          enum:
            - active
            - inactive
        latest_request_id:
          type:
            - string
            - 'null'
          description: ID of the latest request triggered by this subscription.
        created_at:
          type: string
          format: date-time
          description: Timestamp when the subscription was created.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when the subscription was last updated.
    AccountSubscriptionListResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              type: object
              description: Object keyed by subscription name.
              additionalProperties:
                $ref: '#/components/schemas/AccountSubscription'
    AccountSubscriptionCreateRequest:
      type: object
      description: Request body for creating an account subscription.
      required:
        - enroll
      properties:
        enroll:
          type: array
          description: Array of subscription names to enroll.
          items:
            type: string
          minItems: 1
    AccountSubscriptionResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/AccountSubscription'
    AccountTransaction:
      type: object
      description: A transaction for an account.
      required:
        - id
        - account_id
        - merchant
        - amount
        - auth_amount
        - currency_code
        - transaction_amount
        - transaction_auth_amount
        - transaction_currency_code
        - status
        - descriptor
        - transacted_at
        - posted_at
        - voided_at
        - original_txn_id
        - created_at
        - updated_at
      properties:
        id:
          type: string
