    PaymentResourceError:
      type:
        - object
        - 'null'
      description: Error details when a payment fails or is canceled.
      required:
        - type
        - code
        - sub_type
        - message
      properties:
        type:
          type: string
          description: The category of payment error.
          enum:
            - PAYMENT_FAILED
            - PAYMENT_CANCELED
        code:
          type: integer
          description: Numeric error code (10XXX range).
          enum:
            - 10001
            - 10002
            - 10003
            - 10004
            - 10005
            - 10006
            - 10007
            - 10008
            - 10009
            - 10010
        sub_type:
          type: string
          description: Specific payment error classification.
          enum:
            - PAYMENT_INSUFFICIENT_FUNDS
            - PAYMENT_UNAUTHORIZED
            - PAYMENT_INVALID_ACCOUNT
            - PAYMENT_UNAUTHORIZED_SOURCE
            - PAYMENT_UNAUTHORIZED_DESTINATION
            - PAYMENT_INVALID_SOURCE_ACCOUNT
            - PAYMENT_INVALID_DESTINATION_ACCOUNT
            - PAYMENT_REJECTED_BY_DESTINATION_INSTITUTION
            - PAYMENT_REJECTED_INVALID_AMOUNT
        message:
          type: string
          description: Human-readable error description.
      example:
        type: PAYMENT_FAILED
        code: 10001
        sub_type: PAYMENT_INSUFFICIENT_FUNDS
        message: Payment failed due to insufficient funds from the source account.
    Payment:
      type: object
      description: A Payment represents a transfer of funds between two accounts.
      required:
        - id
        - source
        - destination
        - amount
        - status
        - type
        - created_at
        - updated_at
      properties:
        id:
          type: string
          description: Unique identifier for the payment.
          pattern: ^pmt_\w+$
          example: pmt_rPrDPEwyCVUcm
        reversal_id:
          type:
            - string
            - 'null'
          description: Identifier of the associated reversal, if any.
          pattern: ^rvs_\w+$
        source_trace_id:
          type:
            - string
            - 'null'
          description: Trace identifier for the source side of the payment.
        destination_trace_id:
          type:
            - string
            - 'null'
          description: Trace identifier for the destination side of the payment.
        source:
          description: |
            The source account ID. This field is expandable. When expanded, returns the full Account object.
          anyOf:
            - type: string
              pattern: ^acc_\w+$
            - type: 'null'
            - $ref: '#/components/schemas/Account'
        destination:
          description: |
            The destination account ID. This field is expandable. When expanded, returns the full Account object.
          anyOf:
            - type: string
              pattern: ^acc_\w+$
            - type: 'null'
            - $ref: '#/components/schemas/Account'
        amount:
          type: integer
          description: Payment amount in cents.
          minimum: 0
          example: 5000
        description:
          type:
            - string
            - 'null'
          description: Human-readable description for the payment.
        status:
          type: string
          description: Current status of the payment.
          enum:
            - pending
            - processing
            - sent
            - posted
            - settled
            - failed
            - reversed
            - canceled
            - cashed
        fund_status:
          type:
            - string
            - 'null'
          description: The current status of the payment funds.
          enum:
            - transmitting
            - transmitted
            - requested
            - clearing
            - pending
            - hold
            - sent
            - posted
            - cashed
            - unknown
            - pending_consolidation
            - pending_clearing
            - failed
            - null
        estimated_completion_date:
          type:
            - string
            - 'null'
          format: date
          description: Estimated date when the payment will be completed (YYYY-MM-DD).
        source_settlement_date:
          type:
            - string
            - 'null'
          format: date
          description: The expected or actual settlement date for the source side of the payment.
        destination_settlement_date:
          type:
            - string
            - 'null'
          format: date
          description: The expected or actual settlement date for the destination side of the payment.
        source_status:
          type:
            - string
            - 'null'
          description: The status of the source side of the payment.
        destination_status:
          type:
            - string
            - 'null'
          description: The status of the destination side of the payment.
        destination_payment_method:
          type:
            - string
            - 'null'
          description: The payment method used for the destination.
        fee:
          type:
            - object
            - 'null'
          description: Fee associated with the payment.
          required:
            - type
            - amount
          properties:
            type:
              type: string
              description: The fee type.
              enum:
                - total
            amount:
              type: integer
              description: Fee amount in cents.
              minimum: 0
        type:
          type: string
          description: The type of payment.
          enum:
            - standard
            - clearing
        error:
          $ref: '#/components/schemas/PaymentResourceError'
        metadata:
          $ref: '#/components/schemas/Metadata'
        created_at:
          type: string
          format: date-time
          description: Timestamp when the payment was created.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when the payment was last updated.
    PaymentListResponse:
      allOf:
        - $ref: '#/components/schemas/ListEnvelope'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/Payment'
    PaymentCreateRequest:
      type: object
      description: Request body for creating a payment.
      required:
        - source
        - destination
        - amount
        - description
      properties:
        source:
          type: string
          description: The source account ID.
          pattern: ^acc_\w+$
        destination:
          type: string
          description: The destination account ID.
          pattern: ^acc_\w+$
        amount:
          type: integer
          description: Payment amount in cents.
          minimum: 1
          example: 5000
        description:
          type: string
          description: Human-readable description for the payment.
        metadata:
          $ref: '#/components/schemas/Metadata'
        dry_run:
          type: boolean
          description: Validate the payment request without moving funds.
        fee:
