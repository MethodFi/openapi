components:
  securitySchemes:
    OpalToken:
      type: http
      scheme: bearer
      description: |
        Opal token authentication for Opal session endpoints. Use an Opal token (`otkn_...`)
        as the Bearer token. Created via POST /opal/token using a secret key.
    SecretKey:
      type: http
      scheme: bearer
      description: |
        Secret key authentication. Use your team's secret key (`sk_...`) as the Bearer token.
        All authenticated API endpoints require this scheme unless otherwise noted.
  parameters:
    MethodVersion:
      $ref: '#/components/parameters/method_version'
    PageParam:
      name: page
      in: query
      required: false
      description: Page number for pagination (1-indexed).
      schema:
        type: integer
        minimum: 1
        default: 1
    PageLimitParam:
      name: page_limit
      in: query
      required: false
      description: Number of items per page.
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 10
    PageCursorParam:
      name: page_cursor
      in: query
      required: false
      description: Cursor for cursor-based pagination. Use the value from `Pagination-Page-Cursor-Next` or `Pagination-Page-Cursor-Prev` response headers.
      schema:
        type: string
    FromDateParam:
      name: from_date
      in: query
      required: false
      description: Filter results from this date (inclusive, YYYY-MM-DD format).
      schema:
        type: string
        format: date
    ToDateParam:
      name: to_date
      in: query
      required: false
      description: Filter results to this date (inclusive, YYYY-MM-DD format).
      schema:
        type: string
        format: date
    AccountIdParam:
      name: accountId
      in: path
      required: true
      description: Unique identifier for the account.
      schema:
        type: string
        pattern: ^acc_\w+$
    EntityIdParam:
      name: entityId
      in: path
      required: true
      description: Unique identifier for the entity.
      schema:
        type: string
        pattern: ^ent_\w+$
    PaymentIdParam:
      name: paymentId
      in: path
      required: true
      description: Unique identifier for the payment.
      schema:
        type: string
        pattern: ^pmt_\w+$
    ExpandParam:
      $ref: '#/components/parameters/expand'
    MethodJwkIdParam:
      name: jwk_id
      in: path
      required: true
      description: Unique identifier for the Method public JWK.
      schema:
        type: string
        pattern: ^mthd_jwk_\w+$
    method_version:
      name: Method-Version
      in: header
      required: true
      description: |
        API version to use for this request. This spec targets `2025-12-01`.
        The SDK sets this header automatically.
      schema:
        type: string
        enum:
          - '2025-12-01'
        default: '2025-12-01'
    expand_accounts:
      name: expand
      in: query
      required: false
      description: |
        Expand related account resources inline. Supports the account expandable fields
        documented by the API validator for account list and retrieve operations.
      style: form
      explode: true
      schema:
        type: array
        items:
          type: string
          enum:
            - sensitive
            - balance
            - card_brand
            - attribute
            - payoff
            - transaction
            - update
            - payment_instrument
            - latest_verification_session
            - liability.mch_id
    idempotency_key:
      name: Idempotency-Key
      in: header
      required: false
      description: |
        Idempotency key for safely retrying a write request. Reuse the same value when
        retrying the same logical operation to avoid creating duplicate side effects.
      schema:
        type: string
        format: uuid
    AccountAttributeIdParam:
      name: accAttrId
      in: path
      required: true
      description: Unique identifier for the account attribute.
      schema:
        type: string
        pattern: ^acc_attr_\w+$
    AccountBalanceIdParam:
      name: balId
      in: path
      required: true
      description: Unique identifier for the account balance.
      schema:
        type: string
        pattern: ^bal_\w+$
    AccountCardBrandIdParam:
      name: cbrdId
      in: path
      required: true
      description: Unique identifier for the account card brand.
      schema:
        type: string
        pattern: ^cbrd_\w+$
    AccountPaymentInstrumentIdParam:
      name: pmtInsId
      in: path
      required: true
      description: Unique identifier for the account payment instrument.
      schema:
        type: string
        pattern: ^pmt_ins_\w+$
    AccountPayoffIdParam:
      name: pyfId
      in: path
      required: true
      description: Unique identifier for the account payoff.
      schema:
        type: string
        pattern: ^pyf_\w+$
    AccountProductIdParam:
      name: prdId
      in: path
      required: true
      description: Unique identifier for the account product.
      schema:
        type: string
        pattern: ^prd_\w+$
