        - object
        - 'null'
      description: Error details when a webhook is disabled or requires attention.
      required:
        - type
        - code
        - sub_type
        - message
      properties:
        type:
          type: string
          description: The category of webhook error.
          enum:
            - WEBHOOK_DISABLED
            - WEBHOOK_REQUIRES_ATTENTION
        code:
          type: integer
          description: Numeric error code (25XXX range).
          enum:
            - 25001
            - 25002
            - 25003
            - 25004
            - 25005
            - 25006
            - 25007
            - 25008
            - 25009
        sub_type:
          type: string
          description: Specific webhook error classification.
          enum:
            - WEBHOOK_DISABLED_FAILED_OTHER
            - WEBHOOK_DISABLED_RECEIVED_4XX_ERROR
            - WEBHOOK_DISABLED_RECEIVED_5XX_ERROR
            - WEBHOOK_DISABLED_TIMEOUT_ON_RESPONSE
            - WEBHOOK_DISABLED_BY_USER
            - WEBHOOK_REQUIRES_ATTENTION_FAILED_OTHER
            - WEBHOOK_REQUIRES_ATTENTION_RECEIVED_4XX_ERROR
            - WEBHOOK_REQUIRES_ATTENTION_RECEIVED_5XX_ERROR
            - WEBHOOK_REQUIRES_ATTENTION_TIMEOUT_ON_RESPONSE
        message:
          type: string
          description: Human-readable error description.
      example:
        type: WEBHOOK_DISABLED
        code: 25002
        sub_type: WEBHOOK_DISABLED_RECEIVED_4XX_ERROR
        message: Webhook failed 25 times with a client error (4XX type).
    Webhook:
      type: object
      required:
        - id
        - type
        - url
        - status
        - expand_event
        - error
        - metadata
        - created_at
        - updated_at
      properties:
        id:
          type: string
          description: Unique identifier for the webhook.
          example: whk_cSGjA6d9N8y8v
        type:
          $ref: '#/components/schemas/WebhookType'
        url:
          type: string
          format: uri
          description: URL to receive webhook events.
          example: https://example.com/webhooks
        status:
          $ref: '#/components/schemas/WebhookStatus'
        expand_event:
          type: boolean
          description: Whether to include the full resource data in the webhook payload.
        error:
          $ref: '#/components/schemas/WebhookResourceError'
        metadata:
          $ref: '#/components/schemas/Metadata'
        created_at:
          type: string
          format: date-time
          description: Timestamp when the webhook was created.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when the webhook was last updated.
    WebhookListResponse:
      allOf:
        - $ref: '#/components/schemas/ListEnvelope'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/Webhook'
    WebhookCreateRequest:
      type: object
      required:
        - type
        - url
      properties:
        type:
          $ref: '#/components/schemas/WebhookType'
        url:
          type: string
          format: uri
          description: URL to receive webhook events.
        auth_token:
          type: string
          description: Authentication token to include in outbound webhook request headers. This value is write-only.
          writeOnly: true
        hmac_secret:
          type: string
          description: HMAC secret used to sign outbound webhook deliveries. This value is write-only.
          writeOnly: true
        expand_event:
          type: boolean
          description: Whether to include the full resource data in the webhook payload.
        metadata:
          $ref: '#/components/schemas/Metadata'
    WebhookResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/Webhook'
    WebhookDeleteResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              type:
                - object
                - 'null'
              example: null
    WebhookUpdateRequest:
      type: object
      required:
        - status
      properties:
        status:
          $ref: '#/components/schemas/WebhookStatus'
    OpalSessionMode:
      type: string
      description: The mode that determines which flows are configured for the session.
      enum:
        - identity_verification
        - card_connect
        - connect
        - account_verification
        - transactions
    OpalSession:
      type: object
      description: An Opal session representing a client-side workflow for identity verification, account connection, or account verification.
      required:
        - id
        - config
        - entity
        - mode
        - idv
        - cxn
        - avf
        - txn
        - completed_at
        - created_at
        - updated_at
      properties:
        id:
          type: string
          description: Unique identifier for the session.
          example: osess_4kR8mNpL2xQvW7jY
        config:
          type: object
          description: Team-level configuration snapshot for the session.
          properties:
            name:
              type: string
              description: Team display name.
            logo:
              type:
                - string
                - 'null'
              description: Team logo URL.
            opal_should_prefill_entities:
              type: boolean
              description: Whether to prefill entity information.
            primary_color:
              type:
                - string
                - 'null'
              description: Primary brand color.
            event_channel:
              type:
                - string
                - 'null'
              description: Event channel identifier.
            accounts_liability_allow_number_update:
              type: boolean
              description: Whether account number updates are allowed.
            appearance:
              type: string
              enum:
                - light
                - dark
                - system
              description: UI appearance theme.
        entity:
          type: object
          description: Minimal entity representation for the session.
          properties:
            id:
              type: string
              description: Entity identifier.
            individual:
              type:
                - object
                - 'null'
              description: Individual entity details.
            address:
              type:
                - object
                - 'null'
              description: Entity address.
            status:
              type: string
              description: Entity status.
            verification:
              type: object
              description: Entity verification state.
              properties:
                identity:
                  type: object
                  properties:
                    matched:
                      type: boolean
                    verified:
                      type: boolean
                phone:
                  type: object
                  properties:
                    verified:
                      type: boolean
        mode:
          $ref: '#/components/schemas/OpalSessionMode'
        idv:
          type:
            - object
            - 'null'
          description: Identity verification flow configuration and state.
        cxn:
          type:
            - object
            - 'null'
          description: Account connection flow configuration and state.
        avf:
          type:
            - object
            - 'null'
          description: Account verification flow configuration and state.
        txn:
          type:
            - object
            - 'null'
          description: Transactions flow configuration and state.
        completed_at:
          type:
            - string
            - 'null'
          format: date-time
          description: Timestamp when the session was completed, or null if still in progress.
        created_at:
          type: string
          format: date-time
          description: Timestamp when the session was created.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when the session was last updated.
    OpalSessionResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/OpalSession'
    OpalCardConnectAccountFilters:
      type: object
      description: Account filters for the card_connect mode.
      properties:
        exclude:
          type: object
          properties:
            mch_ids:
              type: array
              items:
                type: string
              description: Merchant IDs to exclude.
            unverified_account_numbers:
              type: boolean
              description: Whether to exclude accounts with unverified numbers.
    OpalConnectAccountFilters:
      type: object
      description: Account filters for the connect mode.
      properties:
        include:
          type: object
          properties:
            account_types:
              type: array
              items:
                type: string
              description: Account liability types to include.
            products:
              type: array
              minItems: 1
              items:
                type: string
              description: Required products to filter by.
        exclude:
          type: object
          properties:
            account_types:
              type: array
              items:
                type: string
              description: Account liability types to exclude.
            mch_ids:
              type: array
              items:
                type: string
              description: Merchant IDs to exclude.
            unverified_account_numbers:
              type: boolean
              description: Whether to exclude accounts with unverified numbers.
    OpalTokenCreateRequest:
      type: object
      description: 'Request to create an Opal token. Supports three creation patterns: (A) existing entity via `entity_id`, (B) inline entity via `entity`, or (C) existing session via `session_id`. Exactly one of these three fields must be provided.'
      properties:
        entity_id:
          type: string
          description: 'Pattern A: ID of an existing entity to use for the session.'
          example: ent_au22b1fbFJbp8
        entity:
          type: object
          description: 'Pattern B: Inline entity creation payload.'
          properties:
            type:
              type: string
              description: Entity type.
              enum:
                - individual
            individual:
              type: object
              description: Individual details for entity creation.
        session_id:
          type: string
          description: 'Pattern C: ID of an existing session to create an additional token for.'
          example: osess_4kR8mNpL2xQvW7jY
        mode:
          $ref: '#/components/schemas/OpalSessionMode'
        appearance:
          type: string
          enum:
            - light
            - dark
            - system
          description: UI appearance theme for the session.
        identity_verification:
          type: object
          description: Configuration for the `identity_verification` mode. Required when `mode` is `identity_verification`.
          properties:
            skip_pii:
              type: array
              items:
                type: string
              description: PII fields to skip during identity verification.
        card_connect:
          type: object
          description: Configuration for the `card_connect` mode. Required when `mode` is `card_connect`.
          required:
            - selection_type
          properties:
            selection_type:
              type: string
              enum:
                - single
                - multiple
              description: Whether the user can select one or multiple cards.
            account_filters:
              $ref: '#/components/schemas/OpalCardConnectAccountFilters'
            skip_pii:
              type: array
              items:
                type: string
              description: PII fields to skip during identity verification.
        connect:
          type: object
          description: Configuration for the `connect` mode. Required when `mode` is `connect`.
          required:
            - selection_type
          properties:
            selection_type:
              type: string
              enum:
                - single
                - multiple
                - all
              description: Account selection behavior.
            account_filters:
              $ref: '#/components/schemas/OpalConnectAccountFilters'
            skip_pii:
              type: array
              items:
                type: string
              description: PII fields to skip during identity verification.
        account_verification:
          type: object
          description: Configuration for the `account_verification` mode. Required when `mode` is `account_verification`.
          required:
            - account_id
          properties:
            account_id:
              type: string
              description: ID of the account to verify.
            intent:
              type: string
              enum:
                - data
                - payments
                - transactions
              description: The intent for account verification.
        transactions:
          type: object
          description: Configuration for the `transactions` mode. Required when `mode` is `transactions`.
    OpalToken:
      type: object
      description: A short-lived token used to authenticate an Opal session from a client application.
      required:
        - token
        - session_id
        - valid_until
      properties:
        token:
          type: string
          description: The bearer token value used for Opal client authentication.
          example: otkn_yVf8MKZcGj3a9P2xLwR7nT
        session_id:
          type: string
          description: Unique identifier for the associated Opal session.
          example: osess_4kR8mNpL2xQvW7jY
        valid_until:
          type: string
          format: date-time
          description: Timestamp when this token expires (30 minutes after creation).
    OpalTokenResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/OpalToken'
    OpalNullResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              type:
                - object
                - 'null'
              example: null
    ObjectResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/JsonObject'
      example:
        success: true
        data:
          id: obj_123
        message: null
  headers:
    Pagination-Page:
      description: Current page number.
      schema:
        type: integer
    Pagination-Page-Count:
      description: Total number of pages.
      schema:
        type: integer
    Pagination-Page-Limit:
      description: Number of items per page.
      schema:
        type: integer
    Pagination-Total-Count:
      description: Total number of items across all pages.
      schema:
        type: integer
    Pagination-Page-Cursor-Prev:
      description: Cursor for the previous page, if available.
      schema:
        type:
          - string
          - 'null'
    Pagination-Page-Cursor-Next:
      description: Cursor for the next page, if available.
      schema:
        type:
          - string
          - 'null'
