PageParam:
  name: page
  in: query
  required: false
  description: Page number for pagination (1-indexed).
  schema:
    type: integer
    minimum: 1
    default: 1

PageLimitParam:
  name: page_limit
  in: query
  required: false
  description: Number of items per page.
  schema:
    type: integer
    minimum: 1
    maximum: 100
    default: 10

PageCursorParam:
  name: page_cursor
  in: query
  required: false
  description: Cursor for cursor-based pagination. Use the value from `Pagination-Page-Cursor-Next` or `Pagination-Page-Cursor-Prev` response headers.
  schema:
    type: string

FromDateParam:
  name: from_date
  in: query
  required: false
  description: Filter results from this date (inclusive, YYYY-MM-DD format).
  schema:
    type: string
    format: date

ToDateParam:
  name: to_date
  in: query
  required: false
  description: Filter results to this date (inclusive, YYYY-MM-DD format).
  schema:
    type: string
    format: date
