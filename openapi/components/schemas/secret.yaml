Secret:
  type: object
  required:
    - id
    - metadata
    - status
    - created_at
    - updated_at
  properties:
    id:
      type: string
      description: Unique identifier for the secret.
      example: sec_dMnRPmJQ4ZkxY
    metadata:
      $ref: 'common.yaml#/Metadata'
    status:
      $ref: '#/SecretStatus'
    created_at:
      type: string
      format: date-time
      description: Timestamp when the secret was created.
    updated_at:
      type: string
      format: date-time
      description: Timestamp when the secret was last updated.

SecretStatus:
  type: string
  enum:
    - active
    - deleted

SecretCreateRequest:
  type: object
  required:
    - value
  properties:
    value:
      type: string
      description: The secret value to store securely.
    metadata:
      $ref: 'common.yaml#/Metadata'
SecretResponse:
  allOf:
  - $ref: common.yaml#/SuccessEnvelope
  - type: object
    properties:
      data:
        $ref: '#/Secret'
SecretListResponse:
  allOf:
  - $ref: common.yaml#/ListEnvelope
  - type: object
    properties:
      data:
        type: array
        items:
          $ref: '#/Secret'
