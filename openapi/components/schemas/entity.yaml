EntityConnect:
  type: object
  required:
  - id
  - entity_id
  - status
  - accounts
  - requested_products
  - requested_subscriptions
  - error
  - created_at
  - updated_at
  properties:
    id:
      type: string
      description: Unique identifier for the connect session.
      example: cxn_iENwGBMDnr7sJ
    entity_id:
      type: string
      description: The ID of the entity this connect session belongs to.
      example: ent_au22b1fbFJbp8
    status:
      type: string
      description: Status of the connect session.
      enum:
      - completed
      - in_progress
      - pending
      - failed
    accounts:
      type: array
      items:
        oneOf:
        - type: string
          pattern: ^acc_\w+$
        - $ref: account.yaml#/Account
      description: Expandable. List of account IDs connected through this session.
    requested_products:
      type:
      - array
      - 'null'
      description: Products requested for this connect session.
      items:
        type: string
    requested_subscriptions:
      type:
      - array
      - 'null'
      description: Subscriptions requested for this connect session.
      items:
        type: string
    error:
      type:
      - object
      - 'null'
      description: Error details if the resource encountered an error.
      allOf:
      - $ref: errors/entity_errors.yaml#/ConnectResourceError
    created_at:
      type: string
      format: date-time
      description: Timestamp when the connect session was created.
    updated_at:
      type: string
      format: date-time
      description: Timestamp when the connect session was last updated.
EntityCreditScore:
  type: object
  required:
  - id
  - entity_id
  - status
  - scores
  - error
  - created_at
  - updated_at
  properties:
    id:
      type: string
      description: Unique identifier for the credit score.
      example: crs_pn4ca33GRnrJm
    entity_id:
      type: string
      description: The ID of the entity this credit score belongs to.
      example: ent_au22b1fbFJbp8
    status:
      type: string
      description: Status of the credit score retrieval.
      enum:
      - completed
      - in_progress
      - pending
      - failed
    scores:
      type:
      - array
      - 'null'
      description: Array of credit score results.
      items:
        type: object
        required:
        - score
        - source
        - model
        - factors
        - created_at
        properties:
          score:
            type:
            - integer
            - 'null'
            description: The credit score value.
          source:
            type:
            - string
            - 'null'
            description: The source of the credit score.
          model:
            type:
            - string
            - 'null'
            description: The scoring model used.
          factors:
            type:
            - array
            - 'null'
            description: Factors affecting the credit score.
            items:
              $ref: '#/EntityCreditScoreFactor'
          created_at:
            type: string
            format: date-time
            description: Timestamp when this score was generated.
    error:
      type:
      - object
      - 'null'
      description: Error details if the resource encountered an error.
      allOf:
      - $ref: errors/entity_errors.yaml#/CreditScoreResourceError
    created_at:
      type: string
      format: date-time
      description: Timestamp when the credit score was created.
    updated_at:
      type: string
      format: date-time
      description: Timestamp when the credit score was last updated.
EntityCreditScoreFactor:
  type: object
  properties:
    code:
      type:
      - string
      - 'null'
      description: Factor code.
    description:
      type:
      - string
      - 'null'
      description: Human-readable description of the factor.
EntityIdentity:
  type: object
  required:
  - id
  - entity_id
  - status
  - identities
  - error
  - created_at
  - updated_at
  properties:
    id:
      type: string
      description: Unique identifier for the identity record.
      example: idn_NhTRUJMEr8kn3
    entity_id:
      type: string
      description: The ID of the entity this identity belongs to.
      example: ent_au22b1fbFJbp8
    status:
      type: string
      description: Status of the identity retrieval.
      enum:
      - completed
      - in_progress
      - pending
      - failed
    identities:
      type:
      - array
      - 'null'
      description: Array of identity records found for this entity.
      items:
        type: object
        properties:
          first_name:
            type:
            - string
            - 'null'
            description: First name.
          last_name:
            type:
            - string
            - 'null'
            description: Last name.
          phone:
            type:
            - string
            - 'null'
            description: Phone number.
          dob:
            type:
            - string
            - 'null'
            description: Date of birth.
          address:
            type:
            - object
            - 'null'
            description: Address information.
            properties:
              address:
                type:
                - string
                - 'null'
                description: Street address.
              city:
                type:
                - string
                - 'null'
                description: City.
              state:
                type:
                - string
                - 'null'
                description: State.
              zip:
                type:
                - string
                - 'null'
                description: ZIP code.
          ssn:
            type:
            - string
            - 'null'
            description: Social security number (masked).
    error:
      type:
      - object
      - 'null'
      description: Error details if the resource encountered an error.
      allOf:
      - $ref: common.yaml#/ResourceError
    created_at:
      type: string
      format: date-time
      description: Timestamp when the identity record was created.
    updated_at:
      type: string
      format: date-time
      description: Timestamp when the identity record was last updated.
EntityProduct:
  type: object
  required:
  - name
  - status
  - created_at
  - updated_at
  properties:
    name:
      type: string
      description: Name of the product.
    status:
      type: string
      description: Availability status of the product.
      enum:
      - available
      - restricted
      - unavailable
    status_error:
      type:
      - object
      - 'null'
      description: Error details about the product status.
    latest_request_id:
      type:
      - string
      - 'null'
      description: ID of the latest request for this product.
    latest_successful_request_id:
      type:
      - string
      - 'null'
      description: ID of the latest successful request for this product.
    is_subscribable:
      type: boolean
      description: Whether this product can be subscribed to.
    created_at:
      type: string
      format: date-time
      description: Timestamp when the product was created.
    updated_at:
      type: string
      format: date-time
      description: Timestamp when the product was last updated.
EntitySubscription:
  type: object
  required:
  - id
  - name
  - status
  - created_at
  - updated_at
  properties:
    id:
      type: string
      description: Unique identifier for the entity subscription.
      example: sub_JMDEwMTY1QwMj
    name:
      type: string
      description: Name of the subscription.
    status:
      type: string
      description: Current status of the subscription.
      enum:
      - active
      - inactive
    payload:
      type:
      - object
      - 'null'
      description: Subscription payload data.
    latest_request_id:
      type:
      - string
      - 'null'
      description: ID of the latest request for this subscription.
    created_at:
      type: string
      format: date-time
      description: Timestamp when the subscription was created.
    updated_at:
      type: string
      format: date-time
      description: Timestamp when the subscription was last updated.
CreateEntitySubscriptionRequest:
  type: object
  required:
  - enroll
  properties:
    enroll:
      type: array
      description: Array of subscription names to enroll.
      items:
        type: string
        enum:
        - attribute
        - connect
        - credit_score
      minItems: 1
EntityVehicle:
  type: object
  required:
  - id
  - entity_id
  - status
  - vehicles
  - error
  - created_at
  - updated_at
  properties:
    id:
      type: string
      description: Unique identifier for the vehicle record.
      example: vhl_JMDEwMTY1Qw4c
    entity_id:
      type: string
      description: The ID of the entity this vehicle belongs to.
      example: ent_au22b1fbFJbp8
    status:
      type: string
      description: Status of the vehicle data retrieval.
      enum:
      - completed
      - in_progress
      - pending
      - failed
    vehicles:
      type:
      - array
      - 'null'
      description: Array of vehicles associated with this entity.
      items:
        type: object
        properties:
          vin:
            type:
            - string
            - 'null'
            description: Vehicle identification number.
          year:
            type:
            - string
            - 'null'
            description: Model year.
          make:
            type:
            - string
            - 'null'
            description: Vehicle make.
          model:
            type:
            - string
            - 'null'
            description: Vehicle model.
          series:
