Entity:
  description: An Entity represents an individual or business profile within Method.
  oneOf:
  - $ref: '#/EntityIndividualResource'
  - $ref: '#/EntityCorporationResource'
  - $ref: '#/EntityReceiveOnlyResource'
  discriminator:
    propertyName: type
    mapping:
      individual: '#/EntityIndividualResource'
      corporation: '#/EntityCorporationResource'
      c_corporation: '#/EntityCorporationResource'
      s_corporation: '#/EntityCorporationResource'
      llc: '#/EntityCorporationResource'
      partnership: '#/EntityCorporationResource'
      sole_proprietorship: '#/EntityCorporationResource'
      receive_only: '#/EntityReceiveOnlyResource'
EntityBase:
  type: object
  required:
  - id
  - type
  - status
  - created_at
  - updated_at
  properties:
    id:
      type: string
      description: Unique identifier for the entity.
      pattern: ^ent_\w+$
      example: ent_au22b1fbFJbp8
    type:
      type: string
      description: The type of entity.
      enum:
      - individual
      - c_corporation
      - s_corporation
      - llc
      - partnership
      - sole_proprietorship
      - receive_only
      - corporation
    address:
      type:
      - object
      - 'null'
      description: The entity's address.
      allOf:
      - $ref: common.yaml#/Address
    status:
      type: string
      description: Current status of the entity.
      enum:
      - active
      - incomplete
      - disabled
    error:
      type:
      - object
      - 'null'
      description: Error details if the entity encountered an error.
      allOf:
      - $ref: errors/entity_errors.yaml#/EntityResourceError
    metadata:
      $ref: common.yaml#/Metadata
    created_at:
      type: string
      format: date-time
      description: Timestamp when the entity was created.
    updated_at:
      type: string
      format: date-time
      description: Timestamp when the entity was last updated.
EntityIndividualResource:
  allOf:
  - $ref: '#/EntityBase'
  - type: object
    required:
    - products
    - restricted_products
    - subscriptions
    - available_subscriptions
    - restricted_subscriptions
    properties:
      type:
        type: string
        enum:
        - individual
      individual:
        $ref: '#/EntityIndividual'
      verification:
        $ref: '#/EntityVerification'
      connect:
        description: Expandable. The entity connect session ID or expanded connect object.
        example: cxn_iENwGBMDnr7sJ
        oneOf:
        - type: string
          pattern: ^cxn_\w+$
        - type: 'null'
        - $ref: '#/EntityConnect'
      credit_score:
        description: Expandable. The entity credit score ID or expanded credit score object.
        example: crs_pn4ca33GRnrJm
        oneOf:
        - type: string
          pattern: ^crs_\w+$
        - type: 'null'
        - $ref: '#/EntityCreditScore'
      attribute:
        description: Expandable. The entity attribute ID or expanded attribute object.
        example: attr_QwMjMDEwMTY1
        oneOf:
        - type: string
          pattern: ^attr_\w+$
        - type: 'null'
        - $ref: '#/EntityAttribute'
      vehicle:
        description: Expandable. The entity vehicle ID or expanded vehicle object.
        example: vhl_JMDEwMTY1Qw4c
        oneOf:
        - type: string
          pattern: ^vhl_\w+$
        - type: 'null'
        - $ref: '#/EntityVehicle'
      products:
        type: array
        items:
          type: string
        description: Products currently active for this entity.
      restricted_products:
        type: array
        items:
          type: string
        description: Products restricted for this entity.
      subscriptions:
        type: array
        items:
          type: string
        description: Active subscriptions for this entity.
      available_subscriptions:
        type: array
        items:
          type: string
        description: Subscriptions available for this entity.
      restricted_subscriptions:
        type: array
        items:
          type: string
        description: Subscriptions restricted for this entity.
EntityCorporationResource:
  allOf:
  - $ref: '#/EntityBase'
  - type: object
    properties:
      type:
        type: string
        enum:
        - corporation
        - c_corporation
        - s_corporation
        - llc
        - partnership
        - sole_proprietorship
      corporation:
        $ref: '#/EntityCorporation'
EntityReceiveOnlyResource:
  allOf:
  - $ref: '#/EntityBase'
  - type: object
    properties:
      type:
        type: string
        enum:
        - receive_only
      receive_only:
        $ref: '#/EntityReceiveOnly'
EntityIndividual:
  type:
  - object
  - 'null'
  properties:
    first_name:
      type:
      - string
      - 'null'
      description: First name of the individual.
    last_name:
      type:
      - string
      - 'null'
      description: Last name of the individual.
    phone:
      type:
      - string
      - 'null'
      description: Phone number of the individual.
      pattern: '^\+\d{10,15}$'
      example: '+15121231111'
    email:
      type:
      - string
      - 'null'
      description: Email address of the individual.
      format: email
    dob:
      type:
      - string
      - 'null'
      format: date
      description: Date of birth of the individual (YYYY-MM-DD).
    ssn:
      type:
      - string
      - 'null'
      description: Social security number (masked).
    ssn_4:
      type:
      - string
      - 'null'
      description: Last 4 digits of SSN (masked).
EntityCorporation:
  type:
  - object
  - 'null'
  properties:
    name:
      type:
      - string
      - 'null'
      description: Legal name of the corporation.
    dba:
      type:
      - string
      - 'null'
      description: Doing business as name.
    ein:
      type:
      - string
      - 'null'
      description: Employer Identification Number.
    owners:
      type:
      - array
      - 'null'
      items:
        $ref: '#/EntityCorporationOwner'
      description: List of beneficial owners.
EntityCorporationOwner:
  type: object
  properties:
    first_name:
      type: string
      description: First name of the owner.
    last_name:
      type: string
      description: Last name of the owner.
    phone:
      type: string
      description: Phone number of the owner.
      pattern: '^\+\d{10,15}$'
    email:
      type: string
      description: Email address of the owner.
      format: email
    dob:
      type: string
      format: date
      description: Date of birth of the owner (YYYY-MM-DD).
    address:
      $ref: common.yaml#/Address
EntityReceiveOnly:
  type:
  - object
  - 'null'
  properties:
    name:
      type: string
      description: Name of the receive-only entity.
    phone:
      type:
      - string
      - 'null'
      description: Phone number of the receive-only entity.
      pattern: '^\+\d{10,15}$'
    email:
      type:
      - string
      - 'null'
      description: Email address of the receive-only entity.
      format: email
EntityCapability:
  type: string
  enum:
  - payments:receive
  - payments:send
  - data:retrieve
  - data:sync
EntityVerification:
  type:
  - object
  - 'null'
  properties:
    identity:
      $ref: '#/EntityVerificationIdentity'
    phone:
      $ref: '#/EntityVerificationPhone'
EntityVerificationIdentity:
  type: object
  properties:
    verified:
      type: boolean
      description: Whether the identity has been verified.
    matched:
      type: boolean
      description: Whether the identity information matched.
    latest_verification_session:
      description: ID of the latest identity verification session. Expandable via `identity_latest_verification_session`.
      oneOf:
      - type: string
        pattern: ^evf_\w+$
      - type: 'null'
      - $ref: '#/EntityVerificationSession'
    methods:
      type: array
      items:
        type: string
      description: Available identity verification methods.
EntityVerificationPhone:
  type: object
  properties:
    verified:
      type: boolean
      description: Whether the phone has been verified.
    latest_verification_session:
      description: ID of the latest phone verification session. Expandable via `phone_latest_verification_session`.
      oneOf:
      - type: string
        pattern: ^evf_\w+$
      - type: 'null'
      - $ref: '#/EntityVerificationSession'
    methods:
      type: array
      items:
        type: string
      description: Available phone verification methods.
CreateEntityRequest:
  description: Request body for creating an entity.
  oneOf:
  - $ref: '#/CreateIndividualEntityRequest'
  - $ref: '#/CreateCorporationEntityRequest'
  discriminator:
    propertyName: type
    mapping:
      individual: '#/CreateIndividualEntityRequest'
      corporation: '#/CreateCorporationEntityRequest'
CreateIndividualEntityRequest:
  type: object
  required:
  - type
  - individual
  properties:
    type:
      type: string
      description: The type of entity to create.
      enum:
      - individual
    individual:
      $ref: '#/CreateEntityIndividual'
    address:
      $ref: common.yaml#/Address
    metadata:
      $ref: common.yaml#/Metadata
CreateCorporationEntityRequest:
  type: object
  required:
  - type
  - corporation
  properties:
    type:
      type: string
      description: The type of entity to create.
      enum:
      - corporation
    corporation:
      $ref: '#/CreateEntityCorporation'
    address:
      $ref: common.yaml#/Address
    metadata:
      $ref: common.yaml#/Metadata
CreateEntityIndividual:
  type: object
  properties:
    first_name:
      type: string
      description: First name of the individual.
    last_name:
      type: string
      description: Last name of the individual.
    phone:
      type: string
      description: Phone number of the individual.
      pattern: '^\+\d{10,15}$'
      example: '+15121231111'
    email:
      type: string
      description: Email address of the individual.
      format: email
    dob:
      type: string
      format: date
      description: Date of birth of the individual (YYYY-MM-DD).
    ssn:
      type: string
      pattern: '^\d{9}$'
      description: Social security number (9 digits). Mutually exclusive with ssn_4.
    ssn_4:
      type: string
      pattern: '^\d{4}$'
      description: Last 4 digits of SSN. Mutually exclusive with ssn.
CreateEntityCorporation:
  type: object
  properties:
    name:
      type: string
      description: Legal name of the corporation.
    dba:
      type: string
      description: Doing business as name.
    ein:
      type: string
      description: Employer Identification Number.
    owners:
      type: array
      items:
        $ref: '#/EntityCorporationOwner'
      description: List of beneficial owners.
CreateEntityReceiveOnly:
  type: object
  required:
  - name
  properties:
    name:
      type: string
      description: Name of the receive-only entity (required).
    phone:
      type: string
      description: Phone number of the receive-only entity.
      pattern: '^\+\d{10,15}$'
    email:
      type: string
      description: Email address of the receive-only entity.
      format: email
UpdateEntityRequest:
  type: object
  properties:
    individual:
      $ref: '#/CreateEntityIndividual'
    corporation:
      $ref: '#/CreateEntityCorporation'
    address:
      $ref: common.yaml#/Address
    metadata:
      $ref: common.yaml#/Metadata
EntityAttribute:
  type: object
  required:
  - id
  - entity_id
  - status
  - attributes
  - error
  - created_at
  - updated_at
  properties:
    id:
      type: string
      description: Unique identifier for the entity attribute.
      example: attr_QwMjMDEwMTY1
    entity_id:
      type: string
      description: The ID of the entity this attribute belongs to.
      example: ent_au22b1fbFJbp8
    status:
      type: string
      description: Status of the attribute retrieval.
      enum:
      - completed
      - in_progress
      - pending
      - failed
    attributes:
      $ref: '#/EntityAttributeData'
    error:
      type:
      - object
      - 'null'
      description: Error details if the resource encountered an error.
      allOf:
      - $ref: common.yaml#/ResourceError
    created_at:
      type: string
      format: date-time
      description: Timestamp when the attribute was created.
    updated_at:
      type: string
      format: date-time
      description: Timestamp when the attribute was last updated.
