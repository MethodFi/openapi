Event:
  type: object
  required:
    - id
    - type
    - resource_id
    - resource_type
    - related_ids
    - data
    - diff
    - created_at
    - updated_at
  properties:
    id:
      type: string
      description: Unique identifier for the event.
      example: evt_HnEJMFWS8rJbh
    type:
      description: The webhook event type.
      example: payment.create
      $ref: webhook.yaml#/WebhookType
    resource_id:
      type: string
      description: Identifier of the resource that triggered the event.
      example: pmt_rPrDPEwyCVUFm
    resource_type:
      type: string
      description: Type of the resource that triggered the event.
      example: payment
    related_ids:
      type: array
      items:
        type: string
      description: Identifiers of related resources.
    data:
      description: Current state of the resource at the time of the event.
      $ref: common.yaml#/JsonObject
    diff:
      description: Changes from the previous state of the resource.
      $ref: common.yaml#/JsonObject
    created_at:
      type: string
      format: date-time
      description: Timestamp when the event was created.
    updated_at:
      type: string
      format: date-time
      description: Timestamp when the event was last updated.
WebhookEventPayload:
  type: object
  description: The outbound payload delivered to a webhook subscription URL when an event occurs.
  required:
    - webhook_id
    - id
    - type
    - op
    - event
    - refs
  properties:
    webhook_id:
      type:
        - string
        - 'null'
      description: The unique identifier of the webhook subscription that triggered this event.
      example: whk_cSGjA6d9N8y8R
    id:
      type:
        - string
        - 'null'
      description: The identifier of the resource modified.
      example: acc_BcRdHNjb9TYKV
    type:
      description: The webhook event type.
      example: account.update
      oneOf:
        - $ref: webhook.yaml#/WebhookType
        - type: 'null'
    op:
      type:
        - string
        - 'null'
      description: The operation type derived from the event type (the segment after the first dot).
      example: update
    path:
      type:
        - string
        - 'null'
      description: The URL path pointing to the affected resource. Make a HTTP GET request to this path to retrieve the resource. Only present when available.
      example: /accounts/acc_BcRdHNjb9TYKV
    event:
      type:
        - string
        - 'null'
      description: The unique identifier of the event record. Can be used to retrieve the full event details via the Events API.
      example: evt_knqJgxKUnqDVJ
    refs:
      description: An object containing reference IDs to related resources. Commonly includes entity and may include other resource references depending on the event type.
      oneOf:
        - type: object
          additionalProperties:
            type: string
        - type: 'null'
      example:
        account: acc_BcRdHNjb9TYKV
        entity: ent_qKNBB68bfHGNA
  example:
    webhook_id: whk_cSGjA6d9N8y8R
    id: acc_BcRdHNjb9TYKV
    type: account.update
    op: update
    path: /accounts/acc_BcRdHNjb9TYKV
    event: evt_knqJgxKUnqDVJ
    refs:
      account: acc_BcRdHNjb9TYKV
      entity: ent_qKNBB68bfHGNA

EventResponse:
  allOf:
  - $ref: common.yaml#/SuccessEnvelope
  - type: object
    properties:
      data:
        $ref: '#/Event'
  example:
    success: true
    data:
      id: evt_HnEJMFWS8rJbh
      type: payment.create
      resource_id: pmt_rPrDPEwyCVUcm
      resource_type: payment
      related_ids:
      - acc_b9q2XVAnNFbp3
      - acc_Y8u3qL9mNa1Bz
      data:
        id: pmt_rPrDPEwyCVUcm
        status: pending
        amount: 5000
      diff: {}
      created_at: '2026-01-15T18:30:00.000Z'
      updated_at: '2026-01-15T18:30:00.000Z'
    message: null
EventListResponse:
  allOf:
  - $ref: common.yaml#/ListEnvelope
  - type: object
    properties:
      data:
        type: array
        items:
          $ref: '#/Event'
