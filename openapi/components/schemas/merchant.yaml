Merchant:
  type: object
  required:
  - id
  - parent_name
  - name
  - logo
  - type
  - provider_ids
  - is_temp
  - account_number_formats
  properties:
    id:
      type: string
      description: Unique identifier for the merchant.
      example: mch_aTJMbnCjw34yQ
    parent_name:
      type: string
      description: Name of the parent merchant group.
      example: Chase
    name:
      type: string
      description: Display name of the merchant.
      example: Chase - Credit Cards
    logo:
      type: string
      description: URL of the merchant logo.
      example: https://static.methodfi.com/logos/chase.png
    type:
      $ref: '#/MerchantType'
      description: Type of accounts supported by this merchant.
    provider_ids:
      $ref: '#/MerchantProviderIds'
    is_temp:
      type: boolean
      description: Whether this is a temporary merchant entry.
    account_number_formats:
      type: array
      items:
        type: string
      description: Accepted account number formats.
MerchantType:
  type: string
  enum:
  - auto_loan
  - bank
  - bnpl
  - business_loan
  - city
  - collection
  - county
  - credit_builder
  - credit_card
  - electric_utility
  - fintech
  - home_equity_loan
  - home_loan
  - insurance
  - internet_utility
  - loan
  - medical
  - mortgage
  - personal_loan
  - student_loan
  - student_loans
  - subscription
  - telephone_utility
  - television_utility
  - unknown
  - utility
  - waste_utility
  - water_utility
MerchantProviderIds:
  type: object
  properties:
    plaid:
      type: array
      items:
        type: string
    mx:
      type: array
      items:
        type: string
    finicity:
      type: array
      items:
        type: string
    dpp:
      type: array
      items:
        type: string
    rpps:
      type: array
      items:
        type: string
MerchantResponse:
  allOf:
  - $ref: common.yaml#/SuccessEnvelope
  - type: object
    properties:
      data:
        $ref: '#/Merchant'
MerchantListResponse:
  allOf:
  - $ref: common.yaml#/ListEnvelope
  - type: object
    properties:
      data:
        type: array
        items:
          $ref: '#/Merchant'
