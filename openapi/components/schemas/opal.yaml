OpalToken:
  type: object
  description: A short-lived token used to authenticate an Opal session from a client application.
  required:
  - token
  - session_id
  - valid_until
  properties:
    token:
      type: string
      description: The bearer token value used for Opal client authentication.
      example: otkn_yVf8MKZcGj3a9P2xLwR7nT
    session_id:
      type: string
      description: Unique identifier for the associated Opal session.
      example: osess_4kR8mNpL2xQvW7jY
    valid_until:
      type: string
      format: date-time
      description: Timestamp when this token expires (30 minutes after creation).

OpalSession:
  type: object
  description: An Opal session representing a client-side workflow for identity verification, account connection, or account verification.
  required:
  - id
  - config
  - entity
  - mode
  - idv
  - cxn
  - avf
  - txn
  - completed_at
  - created_at
  - updated_at
  properties:
    id:
      type: string
      description: Unique identifier for the session.
      example: osess_4kR8mNpL2xQvW7jY
    config:
      type: object
      description: Team-level configuration snapshot for the session.
      properties:
        name:
          type: string
          description: Team display name.
        logo:
          type:
          - string
          - 'null'
          description: Team logo URL.
        opal_should_prefill_entities:
          type: boolean
          description: Whether to prefill entity information.
        primary_color:
          type:
          - string
          - 'null'
          description: Primary brand color.
        event_channel:
          type:
          - string
          - 'null'
          description: Event channel identifier.
        accounts_liability_allow_number_update:
          type: boolean
          description: Whether account number updates are allowed.
        appearance:
          type: string
          enum:
          - light
          - dark
          - system
          description: UI appearance theme.
    entity:
      type: object
      description: Minimal entity representation for the session.
      properties:
        id:
          type: string
          description: Entity identifier.
        individual:
          type:
          - object
          - 'null'
          description: Individual entity details.
        address:
          type:
          - object
          - 'null'
          description: Entity address.
        status:
          type: string
          description: Entity status.
        verification:
          type: object
          description: Entity verification state.
          properties:
            identity:
              type: object
              properties:
                matched:
                  type: boolean
                verified:
                  type: boolean
            phone:
              type: object
              properties:
                verified:
                  type: boolean
    mode:
      $ref: '#/OpalSessionMode'
    idv:
      type:
      - object
      - 'null'
      description: Identity verification flow configuration and state.
    cxn:
      type:
      - object
      - 'null'
      description: Account connection flow configuration and state.
    avf:
      type:
      - object
      - 'null'
      description: Account verification flow configuration and state.
    txn:
      type:
      - object
      - 'null'
      description: Transactions flow configuration and state.
    completed_at:
      type:
      - string
      - 'null'
      format: date-time
      description: Timestamp when the session was completed, or null if still in progress.
    created_at:
      type: string
      format: date-time
      description: Timestamp when the session was created.
    updated_at:
      type: string
      format: date-time
      description: Timestamp when the session was last updated.

OpalEvent:
  type: object
  description: An event recorded during an Opal session, following the `<mode>.<object>.<action>` type pattern.
  required:
  - type
  - mode
  - object
  - action
  - timestamp
  - data
  properties:
    type:
      type: string
      description: "Full event type in the format `<mode>.<object>.<action>`."
      example: card_connect.flow.started
    mode:
      type: string
      description: The session mode that produced this event.
      example: card_connect
    object:
      type: string
      description: The object within the mode that the event relates to.
      example: flow
    action:
      type: string
      description: The action that occurred on the object.
      example: started
    timestamp:
      type: string
      format: date-time
      description: ISO 8601 timestamp of when the event occurred.
    data:
      type:
      - object
      - 'null'
      description: Optional event-specific data payload.

OpalSessionMode:
  type: string
  description: The mode that determines which flows are configured for the session.
  enum:
  - identity_verification
  - card_connect
  - connect
  - account_verification
  - transactions

OpalTokenCreateRequest:
  type: object
  description: >-
    Request to create an Opal token. Supports three creation patterns:
    (A) existing entity via `entity_id`, (B) inline entity via `entity`,
    or (C) existing session via `session_id`. Exactly one of these three
    fields must be provided.
  properties:
    entity_id:
      type: string
      description: "Pattern A: ID of an existing entity to use for the session."
      example: ent_au22b1fbFJbp8
    entity:
      type: object
      description: "Pattern B: Inline entity creation payload."
      properties:
        type:
          type: string
          description: Entity type.
          enum:
          - individual
        individual:
          type: object
          description: Individual details for entity creation.
    session_id:
      type: string
      description: "Pattern C: ID of an existing session to create an additional token for."
      example: osess_4kR8mNpL2xQvW7jY
    mode:
      $ref: '#/OpalSessionMode'
    appearance:
      type: string
      enum:
      - light
      - dark
      - system
      description: UI appearance theme for the session.
    identity_verification:
      type: object
      description: Configuration for the `identity_verification` mode. Required when `mode` is `identity_verification`.
      properties:
        skip_pii:
          type: array
          items:
            type: string
          description: PII fields to skip during identity verification.
    card_connect:
      type: object
      description: Configuration for the `card_connect` mode. Required when `mode` is `card_connect`.
      required:
      - selection_type
      properties:
        selection_type:
          type: string
          enum:
          - single
          - multiple
          description: Whether the user can select one or multiple cards.
        account_filters:
          $ref: '#/OpalCardConnectAccountFilters'
        skip_pii:
          type: array
          items:
            type: string
          description: PII fields to skip during identity verification.
    connect:
      type: object
      description: Configuration for the `connect` mode. Required when `mode` is `connect`.
      required:
      - selection_type
      properties:
        selection_type:
          type: string
          enum:
          - single
          - multiple
          - all
          description: Account selection behavior.
        account_filters:
          $ref: '#/OpalConnectAccountFilters'
        skip_pii:
          type: array
          items:
            type: string
          description: PII fields to skip during identity verification.
    account_verification:
      type: object
      description: Configuration for the `account_verification` mode. Required when `mode` is `account_verification`.
      required:
      - account_id
      properties:
        account_id:
          type: string
          description: ID of the account to verify.
        intent:
          type: string
          enum:
          - data
          - payments
          - transactions
          description: The intent for account verification.
    transactions:
      type: object
      description: Configuration for the `transactions` mode. Required when `mode` is `transactions`.

OpalTokenUpdateRequest:
  type: object
  description: Request body for updating an Opal token session by executing a flow operation.
  properties:
    data:
      type: object
      description: Operation-specific data payload. The shape depends on the flow type and operation being executed.

OpalEventCreateRequest:
  type: object
  description: Request to record one or more events for the current Opal session.
  required:
  - events
  properties:
    events:
      type: array
      minItems: 1
      items:
        type: object
        required:
        - action
        properties:
          action:
            type: string
            description: Event action identifier.
          metadata:
            type: object
            description: Optional metadata associated with the event.

OpalConnectAccountFilters:
  type: object
  description: Account filters for the connect mode.
  properties:
    include:
      type: object
      properties:
        account_types:
          type: array
          items:
            type: string
          description: Account liability types to include.
        products:
          type: array
          minItems: 1
          items:
            type: string
          description: Required products to filter by.
    exclude:
      type: object
      properties:
        account_types:
          type: array
          items:
            type: string
          description: Account liability types to exclude.
        mch_ids:
          type: array
          items:
            type: string
          description: Merchant IDs to exclude.
        unverified_account_numbers:
          type: boolean
          description: Whether to exclude accounts with unverified numbers.

OpalCardConnectAccountFilters:
  type: object
  description: Account filters for the card_connect mode.
  properties:
    exclude:
      type: object
      properties:
        mch_ids:
          type: array
          items:
            type: string
          description: Merchant IDs to exclude.
        unverified_account_numbers:
          type: boolean
          description: Whether to exclude accounts with unverified numbers.

OpalTokenResponse:
  allOf:
  - $ref: common.yaml#/SuccessEnvelope
  - type: object
    properties:
      data:
        $ref: '#/OpalToken'

OpalSessionResponse:
  allOf:
  - $ref: common.yaml#/SuccessEnvelope
  - type: object
    properties:
      data:
        $ref: '#/OpalSession'

OpalNullResponse:
  allOf:
  - $ref: common.yaml#/SuccessEnvelope
  - type: object
    properties:
      data:
        type:
        - object
        - 'null'
        example: null

OpalEventListResponse:
  allOf:
  - $ref: common.yaml#/ListEnvelope
  - type: object
    properties:
      data:
        type: array
        items:
          $ref: '#/OpalEvent'
