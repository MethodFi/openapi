AccountResourceError:
  type:
  - object
  - 'null'
  description: Error details when an account is disabled.
  required:
  - type
  - code
  - sub_type
  - message
  properties:
    type:
      type: string
      description: The category of account error.
      enum:
      - ACCOUNT_DISABLED
    code:
      type: integer
      description: Numeric error code (11XXX range).
      enum:
      - 11001
      - 11002
      - 11003
      - 11004
      - 11005
      - 11006
    sub_type:
      type: string
      description: Specific account error classification.
      enum:
      - ACCOUNT_INVALID_DETAILS
      - ACCOUNT_UNAUTHORIZED_PAYMENT
      - ACCOUNT_CLOSED
      - ACCOUNT_CONSENT_WITHDRAWN
      - ACCOUNT_DISABLED_INVALID_STATE
      - ACCOUNT_DISABLED_HOLDER_ENTITY_DISABLED
    message:
      type: string
      description: Human-readable error description.
  example:
    type: ACCOUNT_DISABLED
    code: 11001
    sub_type: ACCOUNT_INVALID_DETAILS
    message: Account was disabled due to invalid information reported by the financial institution.

AccountVerificationResourceError:
  type:
  - object
  - 'null'
  description: Error details when an account verification is disabled.
  required:
  - type
  - code
  - sub_type
  - message
  properties:
    type:
      type: string
      description: The category of verification error.
      enum:
      - ACCOUNT_VERIFICATION_DISABLED
    code:
      type: integer
      description: Numeric error code (13XXX range).
      enum:
      - 13001
      - 13002
    sub_type:
      type: string
      description: Specific verification error classification.
      enum:
      - ACCOUNT_VERIFICATION_ATTEMPT_LIMIT_REACHED
      - ACCOUNT_VERIFICATION_DEPOSITS_FAILED
    message:
      type: string
      description: Human-readable error description.
  example:
    type: ACCOUNT_VERIFICATION_DISABLED
    code: 13001
    sub_type: ACCOUNT_VERIFICATION_ATTEMPT_LIMIT_REACHED
    message: Account verification was disabled due to the maximum verification limit (5) being reached.

AccountVerificationSessionResourceError:
  type:
