get:
  operationId: listPublicJwks
  summary: List public JWKs
  description: Returns the currently active Method public keys for Message-Level Encryption.
  tags:
    - Public Keys
  security: []
  responses:
    '200':
      description: Public JWK set for Method encryption.
      headers:
        Cache-Control:
          description: Caching directive for the public JWK set.
          schema:
            type: string
            example: public, max-age=3600
      content:
        application/json:
          schema:
            $ref: '../components/schemas/public_key.yaml#/WellKnownJwksResponse'
          example:
            keys:
              - kid: mthd_jwk_abc123
                kty: RSA
                alg: RSA-OAEP-256
                use: enc
                n: sXchf3Hj7G6m1mQF2k38QeY7s9lQfV4sLzM0YJr7Q7B6U2CjQX8m5w
                e: AQAB
    '400':
      $ref: '../components/responses/error.yaml#/BadRequest'
    '500':
      $ref: '../components/responses/error.yaml#/InternalError'
