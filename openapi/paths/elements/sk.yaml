create_token:
  post:
    operationId: elementsCreateToken
    deprecated: true
    summary: Create an element token
    description: |
      Creates a new element token for client-side use. The token is scoped to a specific entity
      and has an expiration. Use this server-side to generate tokens for your frontend.
    tags:
      - Elements
    security:
      - SecretKey: []
    parameters:
      - $ref: '../../components/parameters/method_version.yaml'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - entity_id
              - type
            properties:
              entity_id:
                type: string
                description: The entity ID to scope the token to.
                pattern: '^ent_\w+$'
              type:
                type: string
                description: The type of element token to create.
              element_type:
                type: string
                description: The specific element type for the token.
    responses:
      '200':
        description: The created element token.
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/common.yaml#/ObjectResponse'
      '400':
        $ref: '../../components/responses/error.yaml#/BadRequest'
      '401':
        $ref: '../../components/responses/error.yaml#/Unauthorized'
      '500':
        $ref: '../../components/responses/error.yaml#/InternalError'

session_results:
  get:
    operationId: elementsRetrieveSessionResults
    deprecated: true
    summary: Retrieve element session results
    description: Returns the results of a completed element session. Use this to retrieve data collected during an element flow.
    tags:
      - Elements
    security:
      - SecretKey: []
    parameters:
      - $ref: '../../components/parameters/method_version.yaml'
      - name: pk_elem_id
        in: path
        required: true
        description: The element token identifier.
        schema:
          type: string
          pattern: '^pk_elem_\w+$'
    responses:
      '200':
        description: The session results.
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/common.yaml#/ObjectResponse'
      '400':
        $ref: '../../components/responses/error.yaml#/BadRequest'
      '401':
        $ref: '../../components/responses/error.yaml#/Unauthorized'
      '404':
        $ref: '../../components/responses/error.yaml#/NotFound'
      '500':
        $ref: '../../components/responses/error.yaml#/InternalError'

sessions:
  get:
    operationId: elementsRetrieveSession
    deprecated: true
    summary: Retrieve an element session
    description: Returns a single element session by its identifier.
    tags:
      - Elements
    security:
      - SecretKey: []
    parameters:
      - $ref: '../../components/parameters/method_version.yaml'
      - name: session_id
        in: path
        required: true
        description: Unique identifier for the element session.
        schema:
          type: string
    responses:
      '200':
        description: The requested session.
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/common.yaml#/ObjectResponse'
      '400':
        $ref: '../../components/responses/error.yaml#/BadRequest'
      '401':
        $ref: '../../components/responses/error.yaml#/Unauthorized'
      '404':
        $ref: '../../components/responses/error.yaml#/NotFound'
      '500':
        $ref: '../../components/responses/error.yaml#/InternalError'

  put:
    operationId: elementsUpdateSession
    deprecated: true
    summary: Update an element session
    description: Updates an element session by its identifier.
    tags:
      - Elements
    security:
      - SecretKey: []
    parameters:
      - $ref: '../../components/parameters/method_version.yaml'
      - name: session_id
        in: path
        required: true
        description: Unique identifier for the element session.
        schema:
          type: string
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            description: Session update parameters.
    responses:
      '200':
        description: The updated session.
        content:
          application/json:
            schema:
              $ref: '../../components/schemas/common.yaml#/ObjectResponse'
      '400':
        $ref: '../../components/responses/error.yaml#/BadRequest'
      '401':
        $ref: '../../components/responses/error.yaml#/Unauthorized'
      '404':
        $ref: '../../components/responses/error.yaml#/NotFound'
      '500':
        $ref: '../../components/responses/error.yaml#/InternalError'

