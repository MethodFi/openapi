recipients:
  post:
    operationId: addReportScheduleRecipient
    summary: Add a recipient
    description: Adds a single recipient email address to an existing report schedule.
    tags:
    - Report Schedules
    security:
    - SecretKey: []
    parameters:
    - $ref: ../components/parameters/method_version.yaml
    - $ref: ../components/parameters/path_ids.yaml#/ReportScheduleIdParam
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: ../components/schemas/report_schedule.yaml#/ReportScheduleAddRecipientRequest
          example:
            recipient: reports@methodfi.com
    responses:
      '200':
        description: The updated report schedule.
        content:
          application/json:
            schema:
              $ref: ../components/schemas/report_schedule.yaml#/ReportScheduleResponse
      '400':
        $ref: ../components/responses/error.yaml#/BadRequest
      '401':
        $ref: ../components/responses/error.yaml#/Unauthorized
      '404':
        $ref: ../components/responses/error.yaml#/NotFound
      '422':
        $ref: ../components/responses/error.yaml#/UnprocessableEntity
      '429':
        $ref: ../components/responses/error.yaml#/RateLimited
      '500':
        $ref: ../components/responses/error.yaml#/InternalError
  put:
    operationId: replaceReportScheduleRecipients
    summary: Replace recipients
    description: Replaces the full set of recipients on an existing report schedule. The array must contain at least one email address.
    tags:
    - Report Schedules
    security:
    - SecretKey: []
    parameters:
    - $ref: ../components/parameters/method_version.yaml
    - $ref: ../components/parameters/path_ids.yaml#/ReportScheduleIdParam
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: ../components/schemas/report_schedule.yaml#/ReportScheduleReplaceRecipientsRequest
          example:
            recipients:
            - reports@methodfi.com
            - ops@methodfi.com
    responses:
      '200':
        description: The updated report schedule.
        content:
          application/json:
            schema:
              $ref: ../components/schemas/report_schedule.yaml#/ReportScheduleResponse
      '400':
        $ref: ../components/responses/error.yaml#/BadRequest
      '401':
        $ref: ../components/responses/error.yaml#/Unauthorized
      '404':
        $ref: ../components/responses/error.yaml#/NotFound
      '422':
        $ref: ../components/responses/error.yaml#/UnprocessableEntity
      '429':
        $ref: ../components/responses/error.yaml#/RateLimited
      '500':
        $ref: ../components/responses/error.yaml#/InternalError
  delete:
    operationId: removeReportScheduleRecipient
    summary: Remove a recipient
    description: Removes a recipient from an existing report schedule. Provide a `recipient` to remove a single email address, or omit it to clear all recipients. All recipients can only be cleared when the schedule does not use the `email` delivery method.
    tags:
    - Report Schedules
    security:
    - SecretKey: []
    parameters:
    - $ref: ../components/parameters/method_version.yaml
    - $ref: ../components/parameters/path_ids.yaml#/ReportScheduleIdParam
    - name: recipient
      in: query
      required: false
      description: The email address to remove from the schedule. If omitted, all recipients are cleared.
      schema:
        type: string
        format: email
    responses:
      '200':
        description: The updated report schedule.
        content:
          application/json:
            schema:
              $ref: ../components/schemas/report_schedule.yaml#/ReportScheduleResponse
      '400':
        $ref: ../components/responses/error.yaml#/BadRequest
      '401':
        $ref: ../components/responses/error.yaml#/Unauthorized
      '404':
        $ref: ../components/responses/error.yaml#/NotFound
      '422':
        $ref: ../components/responses/error.yaml#/UnprocessableEntity
      '429':
        $ref: ../components/responses/error.yaml#/RateLimited
      '500':
        $ref: ../components/responses/error.yaml#/InternalError
