collection:
  get:
    operationId: listReportSchedules
    summary: List all report schedules
    description: Returns all the active report schedules for the authenticated team, or an empty array if none have been created.
    tags:
    - Report Schedules
    security:
    - SecretKey: []
    parameters:
    - $ref: ../components/parameters/method_version.yaml
    responses:
      '200':
        description: A list of report schedules.
        content:
          application/json:
            schema:
              $ref: ../components/schemas/report_schedule.yaml#/ReportScheduleListResponse
      '400':
        $ref: ../components/responses/error.yaml#/BadRequest
      '401':
        $ref: ../components/responses/error.yaml#/Unauthorized
      '429':
        $ref: ../components/responses/error.yaml#/RateLimited
      '500':
        $ref: ../components/responses/error.yaml#/InternalError
  post:
    operationId: createReportSchedule
    summary: Create a report schedule
    description: Creates a new report schedule. Once created, the first run is queued immediately for the next scheduled date.
    tags:
    - Report Schedules
    security:
    - SecretKey: []
    parameters:
    - $ref: ../components/parameters/method_version.yaml
    - $ref: ../components/parameters/idempotency_key.yaml
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: ../components/schemas/report_schedule.yaml#/ReportScheduleCreateRequest
          example:
            types:
            - ach.pull.nightly
            delivery_methods:
            - webhook
            - email
            recipients:
            - example@methodfi.com
            cron: 0 8 * * *
    responses:
      '200':
        description: The newly created report schedule.
        content:
          application/json:
            schema:
              $ref: ../components/schemas/report_schedule.yaml#/ReportScheduleResponse
      '400':
        $ref: ../components/responses/error.yaml#/BadRequest
      '401':
        $ref: ../components/responses/error.yaml#/Unauthorized
      '422':
        $ref: ../components/responses/error.yaml#/UnprocessableEntity
      '429':
        $ref: ../components/responses/error.yaml#/RateLimited
      '500':
        $ref: ../components/responses/error.yaml#/InternalError
individual:
  get:
    operationId: retrieveReportSchedule
    summary: Retrieve a report schedule
    description: Returns a single report schedule by its identifier.
    tags:
    - Report Schedules
    security:
    - SecretKey: []
    parameters:
    - $ref: ../components/parameters/method_version.yaml
    - $ref: ../components/parameters/path_ids.yaml#/ReportScheduleIdParam
    responses:
      '200':
        description: The requested report schedule.
        content:
          application/json:
            schema:
              $ref: ../components/schemas/report_schedule.yaml#/ReportScheduleResponse
      '400':
        $ref: ../components/responses/error.yaml#/BadRequest
      '401':
        $ref: ../components/responses/error.yaml#/Unauthorized
      '404':
        $ref: ../components/responses/error.yaml#/NotFound
      '429':
        $ref: ../components/responses/error.yaml#/RateLimited
      '500':
        $ref: ../components/responses/error.yaml#/InternalError
  patch:
    operationId: updateReportSchedule
    summary: Update a report schedule
    description: Updates the cron expression of an existing report schedule. The next run is re-queued based on the new cadence.
    tags:
    - Report Schedules
    security:
    - SecretKey: []
    parameters:
    - $ref: ../components/parameters/method_version.yaml
    - $ref: ../components/parameters/path_ids.yaml#/ReportScheduleIdParam
    - $ref: ../components/parameters/idempotency_key.yaml
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: ../components/schemas/report_schedule.yaml#/ReportScheduleUpdateRequest
          example:
            cron: 0 9 * * 1-5
    responses:
      '200':
        description: The updated report schedule.
        content:
          application/json:
            schema:
              $ref: ../components/schemas/report_schedule.yaml#/ReportScheduleResponse
      '400':
        $ref: ../components/responses/error.yaml#/BadRequest
      '401':
        $ref: ../components/responses/error.yaml#/Unauthorized
      '404':
        $ref: ../components/responses/error.yaml#/NotFound
      '422':
        $ref: ../components/responses/error.yaml#/UnprocessableEntity
      '429':
        $ref: ../components/responses/error.yaml#/RateLimited
      '500':
        $ref: ../components/responses/error.yaml#/InternalError
  delete:
    operationId: deleteReportSchedule
    summary: Delete a report schedule
    description: Deletes a report schedule. The schedule's status is set to `inactive` and no further reports are generated or delivered.
    tags:
    - Report Schedules
    security:
    - SecretKey: []
    parameters:
    - $ref: ../components/parameters/method_version.yaml
    - $ref: ../components/parameters/path_ids.yaml#/ReportScheduleIdParam
    - $ref: ../components/parameters/idempotency_key.yaml
    responses:
      '200':
        description: The deleted report schedule.
        content:
          application/json:
            schema:
              $ref: ../components/schemas/report_schedule.yaml#/ReportScheduleDeleteResponse
            example:
              success: true
              data: null
              message: null
      '400':
        $ref: ../components/responses/error.yaml#/BadRequest
      '401':
        $ref: ../components/responses/error.yaml#/Unauthorized
      '404':
        $ref: ../components/responses/error.yaml#/NotFound
      '429':
        $ref: ../components/responses/error.yaml#/RateLimited
      '500':
        $ref: ../components/responses/error.yaml#/InternalError
types:
  post:
    operationId: addReportScheduleType
    summary: Add a type
    description: Adds a single report type to an existing report schedule.
    tags:
    - Report Schedules
    security:
    - SecretKey: []
    parameters:
    - $ref: ../components/parameters/method_version.yaml
    - $ref: ../components/parameters/path_ids.yaml#/ReportScheduleIdParam
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: ../components/schemas/report_schedule.yaml#/ReportScheduleAddTypeRequest
          example:
            type: payments.created.previous
    responses:
      '200':
        description: The updated report schedule.
        content:
          application/json:
            schema:
              $ref: ../components/schemas/report_schedule.yaml#/ReportScheduleResponse
      '400':
        $ref: ../components/responses/error.yaml#/BadRequest
      '401':
        $ref: ../components/responses/error.yaml#/Unauthorized
      '404':
        $ref: ../components/responses/error.yaml#/NotFound
      '422':
        $ref: ../components/responses/error.yaml#/UnprocessableEntity
      '429':
        $ref: ../components/responses/error.yaml#/RateLimited
      '500':
        $ref: ../components/responses/error.yaml#/InternalError
  put:
    operationId: replaceReportScheduleTypes
    summary: Replace types
    description: Replaces the full set of report types on an existing report schedule. The array must contain at least one type.
    tags:
    - Report Schedules
    security:
    - SecretKey: []
    parameters:
    - $ref: ../components/parameters/method_version.yaml
    - $ref: ../components/parameters/path_ids.yaml#/ReportScheduleIdParam
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: ../components/schemas/report_schedule.yaml#/ReportScheduleReplaceTypesRequest
          example:
            types:
            - ach.pull.nightly
            - payments.failed.previous_day
    responses:
      '200':
        description: The updated report schedule.
        content:
          application/json:
            schema:
              $ref: ../components/schemas/report_schedule.yaml#/ReportScheduleResponse
      '400':
        $ref: ../components/responses/error.yaml#/BadRequest
      '401':
        $ref: ../components/responses/error.yaml#/Unauthorized
      '404':
        $ref: ../components/responses/error.yaml#/NotFound
      '422':
        $ref: ../components/responses/error.yaml#/UnprocessableEntity
      '429':
        $ref: ../components/responses/error.yaml#/RateLimited
      '500':
        $ref: ../components/responses/error.yaml#/InternalError
  delete:
    operationId: removeReportScheduleType
    summary: Remove a type
    description: Removes a single report type from an existing report schedule. A schedule must always retain at least one type.
    tags:
    - Report Schedules
    security:
    - SecretKey: []
    parameters:
    - $ref: ../components/parameters/method_version.yaml
    - $ref: ../components/parameters/path_ids.yaml#/ReportScheduleIdParam
    - name: type
      in: query
      required: true
      description: The report type to remove from the schedule.
      schema:
        $ref: ../components/schemas/report_schedule.yaml#/ReportScheduleReportType
    responses:
      '200':
        description: The updated report schedule.
        content:
          application/json:
            schema:
              $ref: ../components/schemas/report_schedule.yaml#/ReportScheduleResponse
      '400':
        $ref: ../components/responses/error.yaml#/BadRequest
      '401':
        $ref: ../components/responses/error.yaml#/Unauthorized
      '404':
        $ref: ../components/responses/error.yaml#/NotFound
      '422':
        $ref: ../components/responses/error.yaml#/UnprocessableEntity
      '429':
        $ref: ../components/responses/error.yaml#/RateLimited
      '500':
        $ref: ../components/responses/error.yaml#/InternalError
