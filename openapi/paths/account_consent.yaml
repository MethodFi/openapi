post:
  operationId: updateAccountConsent
  summary: Update account consent
  description: Grants or withdraws consent for data access on the specified account.
  tags:
    - Account Consent
  security:
    - SecretKey: []
  parameters:
    - $ref: '../components/parameters/method_version.yaml'
    - $ref: '../components/parameters/path_ids.yaml#/AccountIdParam'
    - $ref: '../components/parameters/idempotency_key.yaml'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../components/schemas/account.yaml#/AccountConsentUpdateRequest'
        example:
          type: withdraw
          reason: holder_withdrew_consent
  responses:
    '200':
      description: The updated account.
      content:
        application/json:
          schema:
            $ref: '../components/schemas/account.yaml#/AccountResponse'
    '400':
      $ref: '../components/responses/error.yaml#/BadRequest'
    '401':
      $ref: '../components/responses/error.yaml#/Unauthorized'
    '404':
      $ref: '../components/responses/error.yaml#/NotFound'
    '422':
      $ref: '../components/responses/error.yaml#/UnprocessableEntity'
    '429':
      $ref: '../components/responses/error.yaml#/RateLimited'
    '500':
      $ref: '../components/responses/error.yaml#/InternalError'
