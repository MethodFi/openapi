collection:
  get:
    operationId: listAccountPaymentInstruments
    summary: List all account payment instruments
    description: Returns a list of payment instruments for the specified account.
    tags:
    - Account Payment Instruments
    security:
    - SecretKey: []
    parameters:
    - $ref: ../components/parameters/method_version.yaml
    - $ref: ../components/parameters/path_ids.yaml#/AccountIdParam
    - $ref: ../components/parameters/pagination.yaml#/PageParam
    - $ref: ../components/parameters/pagination.yaml#/PageLimitParam
    - $ref: ../components/parameters/pagination.yaml#/PageCursorParam
    responses:
      '200':
        description: A paginated list of account payment instruments.
        headers:
          Pagination-Page:
            $ref: ../components/responses/pagination_headers.yaml#/PaginationHeaders/Pagination-Page
          Pagination-Page-Count:
            $ref: ../components/responses/pagination_headers.yaml#/PaginationHeaders/Pagination-Page-Count
          Pagination-Page-Limit:
            $ref: ../components/responses/pagination_headers.yaml#/PaginationHeaders/Pagination-Page-Limit
          Pagination-Total-Count:
            $ref: ../components/responses/pagination_headers.yaml#/PaginationHeaders/Pagination-Total-Count
          Pagination-Page-Cursor-Prev:
            $ref: ../components/responses/pagination_headers.yaml#/PaginationHeaders/Pagination-Page-Cursor-Prev
          Pagination-Page-Cursor-Next:
            $ref: ../components/responses/pagination_headers.yaml#/PaginationHeaders/Pagination-Page-Cursor-Next
        content:
          application/json:
            schema:
              $ref: ../components/schemas/account.yaml#/AccountPaymentInstrumentListResponse
      '400':
        $ref: ../components/responses/error.yaml#/BadRequest
      '401':
        $ref: ../components/responses/error.yaml#/Unauthorized
      '404':
        $ref: ../components/responses/error.yaml#/NotFound
      '429':
        $ref: ../components/responses/error.yaml#/RateLimited
      '500':
        $ref: ../components/responses/error.yaml#/InternalError
  post:
    operationId: createAccountPaymentInstrument
    summary: Create an account payment instrument
    description: Creates a new payment instrument for the specified account.
    tags:
    - Account Payment Instruments
    security:
    - SecretKey: []
    parameters:
    - $ref: ../components/parameters/method_version.yaml
    - $ref: ../components/parameters/idempotency_key.yaml
    - $ref: ../components/parameters/path_ids.yaml#/AccountIdParam
    responses:
      '200':
        description: The newly created account payment instrument.
        content:
          application/json:
            schema:
              $ref: ../components/schemas/account.yaml#/AccountPaymentInstrumentResponse
      '400':
        $ref: ../components/responses/error.yaml#/BadRequest
      '401':
        $ref: ../components/responses/error.yaml#/Unauthorized
      '404':
        $ref: ../components/responses/error.yaml#/NotFound
      '422':
        $ref: ../components/responses/error.yaml#/UnprocessableEntity
      '429':
        $ref: ../components/responses/error.yaml#/RateLimited
      '500':
        $ref: ../components/responses/error.yaml#/InternalError
individual:
  get:
    operationId: retrieveAccountPaymentInstrument
    summary: Retrieve an account payment instrument
    description: Retrieves an account payment instrument by its unique identifier.
    tags:
    - Account Payment Instruments
    security:
    - SecretKey: []
    parameters:
    - $ref: ../components/parameters/method_version.yaml
    - $ref: ../components/parameters/path_ids.yaml#/AccountIdParam
    - $ref: ../components/parameters/path_ids.yaml#/AccountPaymentInstrumentIdParam
    responses:
      '200':
        description: The requested account payment instrument.
        content:
          application/json:
            schema:
              $ref: ../components/schemas/account.yaml#/AccountPaymentInstrumentResponse
      '400':
        $ref: ../components/responses/error.yaml#/BadRequest
      '401':
        $ref: ../components/responses/error.yaml#/Unauthorized
      '404':
        $ref: ../components/responses/error.yaml#/NotFound
      '429':
        $ref: ../components/responses/error.yaml#/RateLimited
      '500':
        $ref: ../components/responses/error.yaml#/InternalError
  delete:
    operationId: closeAccountPaymentInstrument
    summary: Close an account payment instrument
    description: Closes an account payment instrument. This endpoint is only available starting with API version `2025-12-01`.
    tags:
    - Account Payment Instruments
    security:
    - SecretKey: []
    parameters:
    - $ref: ../components/parameters/method_version.yaml
    - $ref: ../components/parameters/idempotency_key.yaml
    - $ref: ../components/parameters/path_ids.yaml#/AccountIdParam
    - $ref: ../components/parameters/path_ids.yaml#/AccountPaymentInstrumentIdParam
    responses:
      '200':
        description: The closed account payment instrument.
        content:
          application/json:
            schema:
              $ref: ../components/schemas/account.yaml#/AccountPaymentInstrumentResponse
      '400':
        $ref: ../components/responses/error.yaml#/BadRequest
      '401':
        $ref: ../components/responses/error.yaml#/Unauthorized
      '404':
        $ref: ../components/responses/error.yaml#/NotFound
      '422':
        $ref: ../components/responses/error.yaml#/UnprocessableEntity
      '429':
        $ref: ../components/responses/error.yaml#/RateLimited
      '500':
        $ref: ../components/responses/error.yaml#/InternalError
