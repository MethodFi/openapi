collection:
  get:
    operationId: listAccountUpdates
    summary: List all account updates
    description: Returns a list of update records for the specified account.
    tags:
    - Account Updates
    security:
    - SecretKey: []
    parameters:
    - $ref: ../components/parameters/method_version.yaml
    - $ref: ../components/parameters/path_ids.yaml#/AccountIdParam
    - $ref: ../components/parameters/pagination.yaml#/PageParam
    - $ref: ../components/parameters/pagination.yaml#/PageLimitParam
    - $ref: ../components/parameters/pagination.yaml#/PageCursorParam
    responses:
      '200':
        description: A paginated list of account updates.
        headers:
          Pagination-Page:
            $ref: ../components/responses/pagination_headers.yaml#/PaginationHeaders/Pagination-Page
          Pagination-Page-Count:
            $ref: ../components/responses/pagination_headers.yaml#/PaginationHeaders/Pagination-Page-Count
          Pagination-Page-Limit:
            $ref: ../components/responses/pagination_headers.yaml#/PaginationHeaders/Pagination-Page-Limit
          Pagination-Total-Count:
            $ref: ../components/responses/pagination_headers.yaml#/PaginationHeaders/Pagination-Total-Count
          Pagination-Page-Cursor-Prev:
            $ref: ../components/responses/pagination_headers.yaml#/PaginationHeaders/Pagination-Page-Cursor-Prev
          Pagination-Page-Cursor-Next:
            $ref: ../components/responses/pagination_headers.yaml#/PaginationHeaders/Pagination-Page-Cursor-Next
        content:
          application/json:
            schema:
              $ref: ../components/schemas/account.yaml#/AccountUpdateListResponse
      '400':
        $ref: ../components/responses/error.yaml#/BadRequest
      '401':
        $ref: ../components/responses/error.yaml#/Unauthorized
      '404':
        $ref: ../components/responses/error.yaml#/NotFound
      '429':
        $ref: ../components/responses/error.yaml#/RateLimited
      '500':
        $ref: ../components/responses/error.yaml#/InternalError
  post:
    operationId: createAccountUpdate
    summary: Create an account update
    description: Creates a new update request for the specified account.
    tags:
    - Account Updates
    security:
    - SecretKey: []
    parameters:
    - $ref: ../components/parameters/method_version.yaml
    - $ref: ../components/parameters/idempotency_key.yaml
    - $ref: ../components/parameters/path_ids.yaml#/AccountIdParam
    responses:
      '200':
        description: The newly created account update.
        content:
          application/json:
            schema:
              $ref: ../components/schemas/account.yaml#/AccountUpdateResponse
      '400':
        $ref: ../components/responses/error.yaml#/BadRequest
      '401':
        $ref: ../components/responses/error.yaml#/Unauthorized
      '404':
        $ref: ../components/responses/error.yaml#/NotFound
      '422':
        $ref: ../components/responses/error.yaml#/UnprocessableEntity
      '429':
        $ref: ../components/responses/error.yaml#/RateLimited
      '500':
        $ref: ../components/responses/error.yaml#/InternalError
individual:
  get:
    operationId: retrieveAccountUpdate
    summary: Retrieve an account update
    description: Retrieves an account update by its unique identifier.
    tags:
    - Account Updates
    security:
    - SecretKey: []
    parameters:
    - $ref: ../components/parameters/method_version.yaml
    - $ref: ../components/parameters/path_ids.yaml#/AccountIdParam
    - $ref: ../components/parameters/path_ids.yaml#/AccountUpdateIdParam
    responses:
      '200':
        description: The requested account update.
        content:
          application/json:
            schema:
              $ref: ../components/schemas/account.yaml#/AccountUpdateResponse
      '400':
        $ref: ../components/responses/error.yaml#/BadRequest
      '401':
        $ref: ../components/responses/error.yaml#/Unauthorized
      '404':
        $ref: ../components/responses/error.yaml#/NotFound
      '429':
        $ref: ../components/responses/error.yaml#/RateLimited
      '500':
        $ref: ../components/responses/error.yaml#/InternalError
