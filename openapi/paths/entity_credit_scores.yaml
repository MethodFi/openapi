collection:
  get:
    operationId: listEntityCreditScores
    summary: List all entity credit scores
    description: Returns a list of credit scores for the specified entity.
    tags:
    - Entity Credit Scores
    security:
    - SecretKey: []
    parameters:
    - $ref: ../components/parameters/method_version.yaml
    - $ref: ../components/parameters/path_ids.yaml#/EntityIdParam
    - $ref: ../components/parameters/pagination.yaml#/PageParam
    - $ref: ../components/parameters/pagination.yaml#/PageLimitParam
    - $ref: ../components/parameters/pagination.yaml#/PageCursorParam
    - $ref: ../components/parameters/pagination.yaml#/FromDateParam
    - $ref: ../components/parameters/pagination.yaml#/ToDateParam
    responses:
      '200':
        description: A list of entity credit scores.
        headers:
          $ref: ../components/responses/pagination_headers.yaml#/PaginationHeaders
        content:
          application/json:
            schema:
              $ref: ../components/schemas/entity.yaml#/EntityCreditScoreListResponse
      '400':
        $ref: ../components/responses/error.yaml#/BadRequest
      '401':
        $ref: ../components/responses/error.yaml#/Unauthorized
      '403':
        $ref: ../components/responses/error.yaml#/Forbidden
      '404':
        $ref: ../components/responses/error.yaml#/NotFound
      '429':
        $ref: ../components/responses/error.yaml#/RateLimited
      '500':
        $ref: ../components/responses/error.yaml#/InternalError
  post:
    operationId: createEntityCreditScore
    summary: Create an entity credit score
    description: Creates a new credit score retrieval for the specified entity.
    tags:
    - Entity Credit Scores
    security:
    - SecretKey: []
    parameters:
    - $ref: ../components/parameters/method_version.yaml
    - $ref: ../components/parameters/idempotency_key.yaml
    - $ref: ../components/parameters/path_ids.yaml#/EntityIdParam
    responses:
      '200':
        description: The created entity credit score.
        content:
          application/json:
            schema:
              $ref: ../components/schemas/entity.yaml#/EntityCreditScoreResponse
      '400':
        $ref: ../components/responses/error.yaml#/BadRequest
      '401':
        $ref: ../components/responses/error.yaml#/Unauthorized
      '403':
        $ref: ../components/responses/error.yaml#/Forbidden
      '404':
        $ref: ../components/responses/error.yaml#/NotFound
      '422':
        $ref: ../components/responses/error.yaml#/UnprocessableEntity
      '429':
        $ref: ../components/responses/error.yaml#/RateLimited
      '500':
        $ref: ../components/responses/error.yaml#/InternalError
individual:
  get:
    operationId: retrieveEntityCreditScore
    summary: Retrieve an entity credit score
    description: Returns a single entity credit score by its identifier.
    tags:
    - Entity Credit Scores
    security:
    - SecretKey: []
    parameters:
    - $ref: ../components/parameters/method_version.yaml
    - $ref: ../components/parameters/path_ids.yaml#/EntityIdParam
    - $ref: ../components/parameters/path_ids.yaml#/EntityCreditScoreIdParam
    responses:
      '200':
        description: The requested entity credit score.
        content:
          application/json:
            schema:
              $ref: ../components/schemas/entity.yaml#/EntityCreditScoreResponse
      '400':
        $ref: ../components/responses/error.yaml#/BadRequest
      '401':
        $ref: ../components/responses/error.yaml#/Unauthorized
      '403':
        $ref: ../components/responses/error.yaml#/Forbidden
      '404':
        $ref: ../components/responses/error.yaml#/NotFound
      '429':
        $ref: ../components/responses/error.yaml#/RateLimited
      '500':
        $ref: ../components/responses/error.yaml#/InternalError
