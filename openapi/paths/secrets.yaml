collection:
  get:
    operationId: listSecrets
    summary: List all secrets
    description: Returns a paginated list of secrets. Secret values are never returned.
    tags:
    - Secrets
    security:
    - SecretKey: []
    parameters:
    - $ref: ../components/parameters/method_version.yaml
    - $ref: ../components/parameters/pagination.yaml#/PageParam
    - $ref: ../components/parameters/pagination.yaml#/PageLimitParam
    - $ref: ../components/parameters/pagination.yaml#/PageCursorParam
    responses:
      '200':
        description: A list of secrets.
        headers:
          $ref: ../components/responses/pagination_headers.yaml#/PaginationHeaders
        content:
          application/json:
            schema:
              $ref: ../components/schemas/secret.yaml#/SecretListResponse
      '400':
        $ref: ../components/responses/error.yaml#/BadRequest
      '401':
        $ref: ../components/responses/error.yaml#/Unauthorized
      '403':
        $ref: ../components/responses/error.yaml#/Forbidden
      '429':
        $ref: ../components/responses/error.yaml#/RateLimited
      '500':
        $ref: ../components/responses/error.yaml#/InternalError
  post:
    operationId: createSecret
    summary: Create a secret
    description: Stores a new secret value securely.
    tags:
    - Secrets
    security:
    - SecretKey: []
    parameters:
    - $ref: ../components/parameters/method_version.yaml
    - $ref: ../components/parameters/idempotency_key.yaml
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: ../components/schemas/secret.yaml#/SecretCreateRequest
    responses:
      '200':
        description: The created secret.
        content:
          application/json:
            schema:
              $ref: ../components/schemas/secret.yaml#/SecretResponse
      '400':
        $ref: ../components/responses/error.yaml#/BadRequest
      '401':
        $ref: ../components/responses/error.yaml#/Unauthorized
      '403':
        $ref: ../components/responses/error.yaml#/Forbidden
      '422':
        $ref: ../components/responses/error.yaml#/UnprocessableEntity
      '429':
        $ref: ../components/responses/error.yaml#/RateLimited
      '500':
        $ref: ../components/responses/error.yaml#/InternalError
individual:
  get:
    operationId: retrieveSecret
    summary: Retrieve a secret
    description: Returns a single secret by its identifier. The secret value is never returned.
    tags:
    - Secrets
    security:
    - SecretKey: []
    parameters:
    - $ref: ../components/parameters/method_version.yaml
    - name: id
      in: path
      required: true
      description: Unique identifier for the secret.
      schema:
        type: string
        pattern: ^sec_\w+$
    responses:
      '200':
        description: The requested secret.
        content:
          application/json:
            schema:
              $ref: ../components/schemas/secret.yaml#/SecretResponse
      '400':
        $ref: ../components/responses/error.yaml#/BadRequest
      '401':
        $ref: ../components/responses/error.yaml#/Unauthorized
      '403':
        $ref: ../components/responses/error.yaml#/Forbidden
      '404':
        $ref: ../components/responses/error.yaml#/NotFound
      '429':
        $ref: ../components/responses/error.yaml#/RateLimited
      '500':
        $ref: ../components/responses/error.yaml#/InternalError
  delete:
    operationId: deleteSecret
    summary: Delete a secret
    description: Deletes a secret.
    tags:
    - Secrets
    security:
    - SecretKey: []
    parameters:
    - $ref: ../components/parameters/method_version.yaml
    - $ref: ../components/parameters/idempotency_key.yaml
    - name: id
      in: path
      required: true
      description: Unique identifier for the secret.
      schema:
        type: string
        pattern: ^sec_\w+$
    responses:
      '200':
        description: Secret deleted successfully.
        content:
          application/json:
            schema:
              type: object
              required: [success, data, message]
              properties:
                success:
                  type: boolean
                  example: true
                data:
                  type: 'null'
                  example: null
                message:
                  type: ['null', string]
                  example: null
      '400':
        $ref: ../components/responses/error.yaml#/BadRequest
      '401':
        $ref: ../components/responses/error.yaml#/Unauthorized
      '403':
        $ref: ../components/responses/error.yaml#/Forbidden
      '404':
        $ref: ../components/responses/error.yaml#/NotFound
      '422':
        $ref: ../components/responses/error.yaml#/UnprocessableEntity
      '429':
        $ref: ../components/responses/error.yaml#/RateLimited
      '500':
        $ref: ../components/responses/error.yaml#/InternalError
